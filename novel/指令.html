<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>指令 · 小手机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'PingFang SC', sans-serif;
      background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 0;
    }

    .app-container {
      width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
      background: #ffffff; display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,0.05); overflow: hidden; position: relative;
    }

    .header {
      display: flex; align-items: center; padding: 10px 14px;
      background: #ffffff; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; gap: 10px;
    }
    .back-btn {
      background: none; border: none; font-size: 18px; cursor: pointer; color: #1d1d1f;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 620; color: #1d1d1f; flex: 1; text-align: center; }
    .save-btn {
      background: #1d1d1f; color: #fff; border: none; border-radius: 18px;
      padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; flex-shrink: 0;
    }

    .content {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .section {
      border: 1px solid #f0f0f0; border-radius: 18px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .section-title {
      font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .input-field {
      border: 1px solid #e5e5ea; border-radius: 12px; padding: 10px 12px;
      font-size: 14px; outline: none; width: 100%; background: #f9f9fb;
      font-family: inherit;
    }
    textarea.input-field {
      resize: vertical; min-height: 140px; line-height: 1.6;
    }

    /* 选择标签 */
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 7px 14px; border-radius: 14px; font-size: 13px; cursor: pointer;
      background: #f2f2f6; color: #6c6c70; border: 1px solid transparent;
      transition: all 0.15s; font-weight: 500; user-select: none;
    }
    .chip:hover { background: #e5e5ea; }
    .chip.selected { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

    .hint-text {
      font-size: 12px; color: #8e8e93; line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <button class="back-btn" id="backBtn">←</button>
    <div class="header-title">指令</div>
    <button class="save-btn" id="deleteBtn" style="background:#ff3b30;margin-right:6px;">删除</button>
<button class="save-btn" id="saveBtn">保存</button>
  </div>

  <div class="content">
    <!-- 标题 -->
    <div class="section">
      <div class="section-title">标题</div>
      <input type="text" class="input-field" id="titleInput" placeholder="输入故事标题...">
    </div>

    <!-- 选择角色 -->
    <div class="section">
      <div class="section-title">选择角色</div>
      <div class="hint-text">AI将读取所选角色的设定</div>
      <div class="chip-row" id="charChips"></div>
    </div>

    <!-- 选择世界书 -->
    <div class="section">
      <div class="section-title">选择世界书</div>
      <div class="hint-text">AI将读取所选世界书的背景设定</div>
      <div class="chip-row" id="worldbookChips"></div>
    </div>

    <!-- 指令 -->
    <div class="section">
      <div class="section-title">指令</div>
      <div class="hint-text">给AI的输出指令（小说式互动）。角色和世界书设定会自动注入，这里只需写场景/风格/开头等。</div>
      <textarea class="input-field" id="instructionInput" placeholder="例如：&#10;&#10;这是一个现代校园背景的故事。你将以小说叙述者的身份，用细腻的文笔描述场景和人物心理。&#10;&#10;开头：开学第一天，我在教室门口撞上了一个陌生人..."></textarea>
    </div>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const novelId = params.get('id');

  const STORAGE_KEY = 'novel_list';

  function loadNovels() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }
  function saveNovels(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function loadCharacters() { try { return JSON.parse(localStorage.getItem('chat_characters') || '[]'); } catch(e) { return []; } }
  function loadWorldbooks() { try { return JSON.parse(localStorage.getItem('worldbooks') || '[]'); } catch(e) { return []; } }

  const novels = loadNovels();
  const novel = novels.find(n => n.id === novelId);
  if (!novel) { window.location.href = 'novel.html'; }

  const characters = loadCharacters();
  const worldbooks = loadWorldbooks();

  // 填充已有数据
  document.getElementById('titleInput').value = novel.title || '';
  document.getElementById('instructionInput').value = novel.instruction || '';

  let selectedChars = novel.selectedChars || [];
  let selectedWorldbooks = novel.selectedWorldbooks || [];

  // 渲染角色标签
  const charChips = document.getElementById('charChips');
  if (characters.length === 0) {
    charChips.innerHTML = '<span class="hint-text">暂无角色，请先在聊天列表创建</span>';
  } else {
    charChips.innerHTML = characters.map(c => {
      const sel = selectedChars.includes(c.id);
      return `<span class="chip${sel ? ' selected' : ''}" data-id="${c.id}">${escapeHtml(c.name)}</span>`;
    }).join('');
  }

  // 渲染世界书标签
  const wbChips = document.getElementById('worldbookChips');
  if (worldbooks.length === 0) {
    wbChips.innerHTML = '<span class="hint-text">暂无世界书，请先在世界书页面创建</span>';
  } else {
    wbChips.innerHTML = worldbooks.map(w => {
      const sel = selectedWorldbooks.includes(w.id);
      return `<span class="chip${sel ? ' selected' : ''}" data-id="${w.id}">${escapeHtml(w.name)}</span>`;
    }).join('');
  }

  // 点击切换选中
  charChips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip'); if (!chip) return;
    const id = chip.getAttribute('data-id');
    if (selectedChars.includes(id)) {
      selectedChars = selectedChars.filter(c => c !== id);
    } else {
      selectedChars.push(id);
    }
    chip.classList.toggle('selected');
  });

  wbChips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip'); if (!chip) return;
    const id = chip.getAttribute('data-id');
    if (selectedWorldbooks.includes(id)) {
      selectedWorldbooks = selectedWorldbooks.filter(w => w !== id);
    } else {
      selectedWorldbooks.push(id);
    }
    chip.classList.toggle('selected');
  });

  // 保存
  document.getElementById('saveBtn').addEventListener('click', () => {
    novel.title = document.getElementById('titleInput').value.trim();
    novel.instruction = document.getElementById('instructionInput').value.trim();
    novel.selectedChars = selectedChars;
    novel.selectedWorldbooks = selectedWorldbooks;
    novel.updatedAt = Date.now();
    saveNovels(novels);
    alert('已保存');
  });

// 删除
  document.getElementById('deleteBtn').addEventListener('click', () => {
    if (!confirm('确定删除这个项目吗？')) return;
    const idx = novels.findIndex(n => n.id === novelId);
    if (idx !== -1) {
      novels.splice(idx, 1);
      saveNovels(novels);
    }
    window.location.href = 'novel.html';
  });

  // 返回
  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'novel.html';
  });

  function escapeHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
})();
</script>
</body>
</html>
