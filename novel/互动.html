<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="互动">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>互动</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Playfair+Display:ital@0;1&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/effects.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f7f5;
  --white: #ffffff;
  --ink: #1a1a1a;
  --ink-mid: #555;
  --ink-faint: #999;
  --rule: rgba(0,0,0,0.07);
  --shadow: rgba(0,0,0,0.05);
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
  padding: 0 0 80px;
}

/* ── Top nav ── */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px 12px;
}

.back-link {
  text-decoration: none;
  color: var(--ink-faint);
  font-size: 13px;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.2s;
  border: none;
  background: none;
  cursor: pointer;
}
.back-link:active { color: var(--ink-mid); }

.effect-buttons {
  display: flex;
  gap: 6px;
}
.effect-buttons button {
  border: none;
  background: var(--white);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 2px 8px var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s;
}
.effect-buttons button:active { transform: scale(0.92); }

/* ── Hero header ── */
.hero {
  padding: 8px 24px 24px;
  border-bottom: 1px solid var(--rule);
}

.hero-date {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}

.page-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 20px;
}

/* ── Meta info pills ── */
.meta-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.meta-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.meta-key {
  font-family: 'Playfair Display', serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  width: 30px;
  flex-shrink: 0;
}

.meta-val {
  font-size: 13px;
  color: var(--ink-mid);
  line-height: 1.5;
}

/* ── Tabs ── */
.tab-bar {
  display: flex;
  gap: 0;
  padding: 16px 24px 0;
  border-bottom: 1px solid var(--rule);
}

.tab-button {
  border: none;
  background: none;
  padding: 10px 16px 12px;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-faint);
  cursor: pointer;
  letter-spacing: 0.04em;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
}

.tab-button.active {
  color: var(--ink);
  border-bottom-color: var(--ink);
}

/* ── Tab content ── */
.tab-content {
  display: none;
  padding: 28px 24px;
  animation: fadeIn 0.3s ease;
}
.tab-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Main text / story feed (test tab) ── */
.page-content {
  font-size: 15px;
  line-height: 2.1;
  color: var(--ink);
  font-weight: 300;
  letter-spacing: 0.02em;
}

.story-feed {
  display: flex;
  flex-direction: column;
  gap: 26px;
}

.story-block { animation: fadeIn 0.35s ease; }

/* AI narration — no bubble, flows like the original page-content */
.story-block.ai .story-text {
  font-size: 15px;
  line-height: 2.1;
  color: var(--ink);
  font-weight: 300;
  letter-spacing: 0.02em;
  white-space: pre-line;
}
.story-block.ai .story-by {
  display: block;
  margin-top: 10px;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
}

/* User turn — small bubble, right aligned */
.story-block.user {
  display: flex;
  justify-content: flex-end;
}
.story-block.user .story-inner {
  max-width: 76%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.story-block.user .story-text {
  background: var(--ink);
  color: var(--bg);
  padding: 10px 15px;
  border-radius: 16px 16px 4px 16px;
  font-family: 'Noto Serif SC', serif;
  font-size: 13.5px;
  font-weight: 400;
  line-height: 1.7;
  letter-spacing: 0.02em;
}
.story-block.user .story-by {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 11px;
  color: var(--ink-faint);
  padding-right: 4px;
}

.story-block.thinking .story-text {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--ink-faint);
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 14px;
}
.think-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--ink-faint);
  opacity: 0.4;
  animation: breathe 1.2s ease-in-out infinite;
}
.think-dot:nth-child(2) { animation-delay: 0.2s; }
.think-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes breathe {
  0%, 100% { opacity: 0.25; transform: scale(0.85); }
  50% { opacity: 0.9; transform: scale(1.15); }
}

.empty-hint {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  color: var(--ink-faint);
  font-size: 14px;
  line-height: 1.9;
  text-align: center;
  padding: 30px 10px;
}

/* ── Composer (input bar) ── */
.composer {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--white);
  border-top: 1px solid var(--rule);
  padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 20;
}

.composer-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

.composer-input {
  flex: 1;
  border: 1px solid var(--rule);
  border-radius: 18px;
  padding: 10px 15px;
  font-size: 14px;
  font-family: 'Noto Serif SC', serif;
  outline: none;
  resize: none;
  max-height: 110px;
  line-height: 1.5;
  background: var(--bg);
  color: var(--ink);
  transition: border-color 0.15s;
}
.composer-input:focus { border-color: var(--ink-faint); }

.composer-send {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--ink);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s;
}
.composer-send:active { transform: scale(0.9); }
.composer-send svg { width: 14px; height: 14px; }

.composer-tools {
  display: flex;
  gap: 8px;
}

.tool-btn {
  border: 1px solid var(--rule);
  background: none;
  border-radius: 14px;
  padding: 6px 13px;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 12.5px;
  color: var(--ink-mid);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: border-color 0.15s, color 0.15s;
}
.tool-btn:active { border-color: var(--ink-faint); }
.tool-btn:disabled { opacity: 0.4; pointer-events: none; }
.tool-btn .mark { color: var(--ink-faint); }

/* spacing so fixed composer doesn't cover content on the test tab */
#test.tab-content.active { padding-bottom: 130px; }

/* ── Observe tab (memory summary) ── */
.observe-box {
  border-left: 2px solid var(--rule);
  padding-left: 20px;
}

.observe-label {
  font-family: 'Playfair Display', serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.regen-btn {
  border: 1px solid var(--rule);
  background: none;
  border-radius: 12px;
  padding: 4px 10px;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0;
  text-transform: none;
  color: var(--ink-mid);
  cursor: pointer;
}
.regen-btn:disabled { opacity: 0.4; pointer-events: none; }

.observe-box p {
  font-family: 'IM Fell English', serif;
  font-size: 15px;
  line-height: 2;
  color: var(--ink-mid);
  margin-bottom: 12px;
}
.observe-box p:last-child { margin-bottom: 0; }

/* ── Heartbeat tab (highlight excerpts) ── */
.heartbeat-box {
  padding: 4px 0 20px;
}

.heartbeat-label {
  font-family: 'Playfair Display', serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 28px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.heartbeat-list {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.heartbeat-card {
  text-align: center;
  padding: 0 6px;
}

.heartbeat-card p {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px;
  font-weight: 300;
  line-height: 2.2;
  color: var(--ink-mid);
  letter-spacing: 0.05em;
}

.heartbeat-card .hb-mark {
  display: block;
  color: var(--ink-faint);
  font-size: 13px;
  margin-bottom: 6px;
}

/* ===== 夜间模式变量覆盖 ===== */
body.dark {
  --bg: #0f0f12;
  --white: #1a1a1a;
  --ink: #f2f2f2;
  --ink-mid: rgba(255,255,255,0.75);
  --ink-faint: rgba(255,255,255,0.45);
  --rule: rgba(255,255,255,0.12);
  --shadow: rgba(0,0,0,0.35);
}
</style>

</head>

<body>

<div id="effect-layer"></div>
<div class="topbar">
  <button class="back-link" id="backBtn">← 返回目录</button>
  <div class="effect-buttons">
    <button onclick="toggleRain()">💧</button>
    <button onclick="toggleSnow()">❄️</button>
    <button onclick="toggleNight()">🌙</button>
    <button onclick="togglePaper()">📜</button>
  </div>
</div>

<div class="hero">
  <div class="hero-date" id="heroDate">Personal Journal</div>
  <div class="page-title" id="pageTitle">互动</div>
  <div class="meta-grid" id="metaGrid"></div>
</div>

<div class="tab-bar">
  <button class="tab-button active" onclick="showTab('test', this)">test</button>
  <button class="tab-button" onclick="showTab('observe', this)">observe</button>
  <button class="tab-button" onclick="showTab('heartbeat', this)">heartbeat</button>
</div>

<div id="test" class="tab-content active">
  <div class="page-content">
    <div class="story-feed" id="storyFeed"></div>
  </div>
</div>

<div id="observe" class="tab-content">
  <div class="observe-box">
    <div class="observe-label">
      <span>observe · 记忆摘要</span>
      <button class="regen-btn" id="regenObserveBtn">重新生成</button>
    </div>
    <div id="observeContent">
      <p class="empty-hint" style="text-align:left;padding:0;">尚无记忆摘要。互动若干轮后点击「重新生成」，AI 会读取故事进展并在此整理要点，供后续互动参考。</p>
    </div>
  </div>
</div>

<div id="heartbeat" class="tab-content">
  <div class="heartbeat-box">
    <div class="heartbeat-label">
      <span>♥︎ heartbeat</span>
      <button class="regen-btn" id="regenHeartbeatBtn">重新生成</button>
    </div>
    <div class="heartbeat-list" id="heartbeatContent">
      <div class="heartbeat-card">
        <p class="empty-hint">尚无高光摘录。<br>故事推进后，点击「重新生成」提炼关键情感片段。</p>
      </div>
    </div>
  </div>
</div>

<div class="composer">
  <div class="composer-tools">
    <button class="tool-btn" id="aiReplyBtn"><span class="mark">✒</span> AI 回复</button>
    <button class="tool-btn" id="apiBtn"><span class="mark">⚙</span> API 设置</button>
  </div>
  <div class="composer-row">
    <textarea class="composer-input" id="userInput" placeholder="写下你的动作或对话…" rows="1"></textarea>
    <button class="composer-send" id="sendBtn" aria-label="发送">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 12L20 4L13 20L11 13L4 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<!-- API 设置弹窗 -->

<div class="modal-overlay" id="apiModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100;visibility:hidden;opacity:0;transition:0.2s;">
  <div class="modal-card" style="background:var(--white);border-radius:20px;padding:24px 20px;width:300px;max-width:85vw;display:flex;flex-direction:column;gap:13px;box-shadow:0 20px 50px rgba(0,0,0,0.25);">
    <h3 style="font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;color:var(--ink);text-align:center;">API 设置</h3>
    <div style="font-family:'IM Fell English',serif;font-style:italic;font-size:11px;color:var(--ink-faint);text-align:center;margin-top:-6px;">留空则使用全局配置</div>
    <input type="text" id="apiEndpoint" placeholder="API 地址，如 https://api.openai.com/v1" style="border:1px solid var(--rule);border-radius:12px;padding:10px 12px;font-size:13px;outline:none;background:var(--bg);color:var(--ink);font-family:'Noto Serif SC',serif;">
    <input type="password" id="apiKey" placeholder="API Key" style="border:1px solid var(--rule);border-radius:12px;padding:10px 12px;font-size:13px;outline:none;background:var(--bg);color:var(--ink);font-family:'Noto Serif SC',serif;">
    <div style="display:flex;gap:8px;">
      <select id="apiModelSelect" style="flex:1;border:1px solid var(--rule);border-radius:12px;padding:9px 8px;font-size:12.5px;outline:none;background:var(--bg);color:var(--ink);font-family:'Noto Serif SC',serif;">
        <option value="">手动输入模型名 ↓</option>
      </select>
      <button id="fetchModelsBtn" style="border:1px solid var(--rule);background:var(--bg);border-radius:12px;padding:0 12px;font-size:12px;color:var(--ink-mid);cursor:pointer;white-space:nowrap;font-family:'IM Fell English',serif;font-style:italic;">拉取模型</button>
    </div>
    <input type="text" id="apiModel" placeholder="模型名称（或从上方选择）" style="border:1px solid var(--rule);border-radius:12px;padding:10px 12px;font-size:13px;outline:none;background:var(--bg);color:var(--ink);font-family:'Noto Serif SC',serif;">
    <div id="modelStatus" style="font-size:11px;color:var(--ink-faint);min-height:14px;font-family:'IM Fell English',serif;font-style:italic;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:2px;">
      <button id="apiCancel" style="padding:9px 16px;border-radius:12px;border:none;font-size:13px;background:var(--bg);color:var(--ink);cursor:pointer;font-family:'Noto Serif SC',serif;">取消</button>
      <button id="apiConfirm" style="padding:9px 16px;border-radius:12px;border:none;font-size:13px;background:var(--ink);color:var(--white);cursor:pointer;font-family:'Noto Serif SC',serif;">确认</button>
    </div>
  </div>
</div>

<script>
function showTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  btn.classList.add('active');
}
</script>

<script src="../js/effects.js"></script>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const novelId = params.get('id');

  const STORAGE_KEY = 'novel_list';
  function loadNovels() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch(e) { return []; } }
  function saveNovels(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
  function loadUserData() { try { return JSON.parse(localStorage.getItem('user_data')||'{}'); } catch(e) { return {}; } }
  function loadCharacters() { try { return JSON.parse(localStorage.getItem('chat_characters')||'[]'); } catch(e) { return []; } }
  function loadWorldbooks() { try { return JSON.parse(localStorage.getItem('worldbooks')||'[]'); } catch(e) { return []; } }

  const novels = loadNovels();
  const novel = novels.find(n => n.id === novelId);
  if (!novel) { window.location.href = 'novel.html'; return; }

  const user = loadUserData();
  const characters = loadCharacters();
  const userName = user.name || '你';

  // ── Hero ──
  document.getElementById('pageTitle').textContent = novel.title || '互动';
  const meta = novel.storyMeta || {};
  document.getElementById('heroDate').textContent = meta.dateLabel || 'Personal Journal';

  const metaGrid = document.getElementById('metaGrid');
  const metaRows = [
    ['心情', meta.mood],
    ['天气', meta.weather],
    ['地点', meta.location]
  ].filter(([,v]) => v);
  metaGrid.innerHTML = metaRows.map(([k,v]) => `
    <div class="meta-row">
      <span class="meta-key">${escapeHtml(k)}</span>
      <span class="meta-val">${escapeHtml(v)}</span>
    </div>
  `).join('');

  // ── Story state ──
  let storyMessages = novel.storyMessages || [];
  const feed = document.getElementById('storyFeed');

  function escapeHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderFeed() {
    feed.innerHTML = '';
    if (storyMessages.length === 0) {
      feed.innerHTML = `<div class="empty-hint">故事尚未开始。<br>写下第一句，或点击「AI 回复」开篇。</div>`;
      return;
    }
    storyMessages.forEach(m => {
      const block = document.createElement('div');
      if (m.role === 'user') {
        block.className = 'story-block user';
        block.innerHTML = `
          <div class="story-inner">
            <div class="story-text">${escapeHtml(m.content)}</div>
            <div class="story-by">${escapeHtml(m.by)}</div>
          </div>`;
      } else {
        block.className = 'story-block ai';
        block.innerHTML = `
          <div class="story-text">${escapeHtml(m.content)}</div>
          <div class="story-by">${escapeHtml(m.by)}</div>`;
      }
      feed.appendChild(block);
    });
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function addMessage(role, content, by) {
    storyMessages.push({ role, content, by, time: Date.now() });
    novel.storyMessages = storyMessages;
    novel.updatedAt = Date.now();
    saveNovels(novels);
    renderFeed();
  }

  function showThinking() {
    const block = document.createElement('div');
    block.className = 'story-block thinking';
    block.id = 'thinkingBlock';
    block.innerHTML = `<div class="story-text"><span class="think-dot"></span><span class="think-dot"></span><span class="think-dot"></span></div>`;
    feed.appendChild(block);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
  function hideThinking() {
    const el = document.getElementById('thinkingBlock');
    if (el) el.remove();
  }

  // ── API config ──
  function getApiConfig() {
    return {
      endpoint: novel.apiEndpoint || user.apiEndpoint || '',
      key: novel.apiKey || user.apiKey || '',
      model: novel.apiModel || user.model || 'gpt-3.5-turbo'
    };
  }

  function buildContextInfo() {
    let contextInfo = '';
    if (novel.selectedChars?.length) {
      const chars = characters.filter(c => novel.selectedChars.includes(c.id));
      contextInfo += chars.map(c => `【${c.name}】${c.aiPrompt||''}`).join('\n') + '\n';
    }
    if (novel.selectedWorldbooks?.length) {
      const wbs = loadWorldbooks().filter(w => novel.selectedWorldbooks.includes(w.id));
      contextInfo += wbs.map(w => `【世界书·${w.name}】${w.content}`).join('\n') + '\n';
    }
    if (novel.memorySummary) {
      contextInfo += `【既往记忆摘要】${novel.memorySummary}\n`;
    }
    return contextInfo;
  }

  function callChatAPI(systemPrompt, messages) {
    const cfg = getApiConfig();
    if (!cfg.endpoint || !cfg.key) return Promise.reject(new Error('请先设置 API'));

    let apiUrl = cfg.endpoint.trim().replace(/\/+$/, '');
    if (!apiUrl.endsWith('/chat/completions')) apiUrl += '/chat/completions';

    return new Promise((res, rej) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', apiUrl, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', `Bearer ${cfg.key}`);
      xhr.timeout = 120000;
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { res(JSON.parse(xhr.responseText).choices[0].message.content); }
          catch(e) { rej(new Error('响应解析失败')); }
        } else rej(new Error('HTTP ' + xhr.status));
      };
      xhr.onerror = () => rej(new Error('网络错误'));
      xhr.ontimeout = () => rej(new Error('请求超时'));
      xhr.send(JSON.stringify({
        model: cfg.model,
        messages: [{ role: 'system', content: systemPrompt }, ...messages],
        max_tokens: 1500
      }));
    });
  }

  // ── Main story AI reply ──
  async function triggerAI() {
    const cfg = getApiConfig();
    if (!cfg.endpoint || !cfg.key) { alert('请先设置 API'); return; }

    const aiReplyBtn = document.getElementById('aiReplyBtn');
    aiReplyBtn.disabled = true;
    showThinking();

    const contextInfo = buildContextInfo();
    const systemPrompt = `你是一个小说互动AI。角色须用第三人称叙述，用户须以第二人称"你"指代。根据以下设定与既往记忆，以小说叙述者的身份继续故事，描写细腻，保持文风一致。\n\n${contextInfo}\n指令：${novel.instruction || '进行小说式互动'}`;

    const history = storyMessages.slice(-20).map(m => ({
      role: m.role === 'user' ? 'user' : 'assistant',
      content: m.content
    }));

    try {
      const resp = await callChatAPI(systemPrompt, history);
      const aiName = novel.selectedChars?.length
        ? (characters.find(c => c.id === novel.selectedChars[0])?.name || 'AI')
        : 'AI';
      hideThinking();
      addMessage('ai', resp.trim(), aiName);
    } catch(e) {
      hideThinking();
      addMessage('ai', '⚠ ' + e.message, '系统');
    } finally {
      aiReplyBtn.disabled = false;
    }
  }

  document.getElementById('sendBtn').addEventListener('click', () => {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    addMessage('user', text, userName);
    input.value = '';
    input.style.height = 'auto';
  });

  const userInput = document.getElementById('userInput');
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('sendBtn').click();
    }
  });
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 110) + 'px';
  });

  document.getElementById('aiReplyBtn').addEventListener('click', triggerAI);

  // ── Observe tab: memory summary ──
  function renderObserve() {
    const box = document.getElementById('observeContent');
    if (novel.memorySummary) {
      box.innerHTML = novel.memorySummary.split(/\n+/).filter(Boolean)
        .map(p => `<p>${escapeHtml(p)}</p>`).join('');
    } else {
      box.innerHTML = `<p class="empty-hint" style="text-align:left;padding:0;">尚无记忆摘要。互动若干轮后点击「重新生成」，AI 会读取故事进展并在此整理要点，供后续互动参考。</p>`;
    }
  }

  document.getElementById('regenObserveBtn').addEventListener('click', async () => {
    if (storyMessages.length === 0) { alert('故事还没有内容，无法总结'); return; }
    const cfg = getApiConfig();
    if (!cfg.endpoint || !cfg.key) { alert('请先设置 API'); return; }

    const btn = document.getElementById('regenObserveBtn');
    btn.disabled = true;
    btn.textContent = '生成中…';

    const full = storyMessages.map(m => `${m.by}：${m.content}`).join('\n');
    const systemPrompt = `你是记忆整理助手。请阅读以下小说互动记录，提炼出简洁的要点式记忆摘要（3-6条，每条一行，客观陈述剧情进展、人物关系与重要细节），供后续互动时AI快速回顾上下文使用。不要添加额外评论，直接输出摘要内容。`;

    try {
      const resp = await callChatAPI(systemPrompt, [{ role: 'user', content: full }]);
      novel.memorySummary = resp.trim();
      novel.updatedAt = Date.now();
      saveNovels(novels);
      renderObserve();
    } catch(e) {
      alert('生成失败：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '重新生成';
    }
  });

  // ── Heartbeat tab: highlight excerpts ──
  function renderHeartbeat() {
    const box = document.getElementById('heartbeatContent');
    if (novel.heartbeatExcerpts?.length) {
      box.innerHTML = novel.heartbeatExcerpts.map(line => `
        <div class="heartbeat-card">
          <span class="hb-mark">♥</span>
          <p>${escapeHtml(line)}</p>
        </div>
      `).join('');
    } else {
      box.innerHTML = `<div class="heartbeat-card"><p class="empty-hint">尚无高光摘录。<br>故事推进后，点击「重新生成」提炼关键情感片段。</p></div>`;
    }
  }

  document.getElementById('regenHeartbeatBtn').addEventListener('click', async () => {
    if (storyMessages.length === 0) { alert('故事还没有内容，无法提炼'); return; }
    const cfg = getApiConfig();
    if (!cfg.endpoint || !cfg.key) { alert('请先设置 API'); return; }

    const btn = document.getElementById('regenHeartbeatBtn');
    btn.disabled = true;
    btn.textContent = '生成中…';

    const full = storyMessages.map(m => `${m.by}：${m.content}`).join('\n');
    const systemPrompt = `你是文学摘录助手。请阅读以下小说互动记录，挑选其中 3-5 个最具情感张力或转折意义的瞬间，分别提炼为一句精炼、有诗意的短句（每句不超过20字，类似日记体的内心独白）。仅输出短句，每句一行，不要编号、不要额外说明。`;

    try {
      const resp = await callChatAPI(systemPrompt, [{ role: 'user', content: full }]);
      novel.heartbeatExcerpts = resp.trim().split(/\n+/).filter(Boolean);
      novel.updatedAt = Date.now();
      saveNovels(novels);
      renderHeartbeat();
    } catch(e) {
      alert('生成失败：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '重新生成';
    }
  });

  // ── API modal ──
  const apiModal = document.getElementById('apiModal');
  const modelSelect = document.getElementById('apiModelSelect');
  const modelStatus = document.getElementById('modelStatus');

  document.getElementById('apiBtn').addEventListener('click', () => {
    document.getElementById('apiEndpoint').value = novel.apiEndpoint || '';
    document.getElementById('apiKey').value = novel.apiKey || '';
    document.getElementById('apiModel').value = novel.apiModel || '';
    modelSelect.innerHTML = '<option value="">手动输入模型名 ↓</option>';
    modelStatus.textContent = '';
    apiModal.style.visibility = 'visible';
    apiModal.style.opacity = '1';
  });
  function closeApiModal() {
    apiModal.style.visibility = 'hidden';
    apiModal.style.opacity = '0';
  }
  document.getElementById('apiCancel').addEventListener('click', closeApiModal);
  document.getElementById('apiConfirm').addEventListener('click', () => {
    novel.apiEndpoint = document.getElementById('apiEndpoint').value.trim();
    novel.apiKey = document.getElementById('apiKey').value.trim();
    novel.apiModel = document.getElementById('apiModel').value.trim();
    saveNovels(novels);
    closeApiModal();
  });
  apiModal.addEventListener('click', e => { if (e.target === apiModal) closeApiModal(); });

  document.getElementById('fetchModelsBtn').addEventListener('click', () => {
    const endpoint = document.getElementById('apiEndpoint').value.trim();
    const key = document.getElementById('apiKey').value.trim();
    if (!endpoint || !key) {
      modelStatus.textContent = '请先填写 API 地址和 Key';
      modelStatus.style.color = '#b5544a';
      return;
    }
    modelStatus.textContent = '拉取中…';
    modelStatus.style.color = 'var(--ink-faint)';

    let url = endpoint.replace(/\/+$/, '');
    if (!url.endsWith('/models')) url += '/models';

    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.setRequestHeader('Authorization', `Bearer ${key}`);
    xhr.timeout = 15000;
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          const data = JSON.parse(xhr.responseText);
          const list = data.data || data.models || [];
          if (!list.length) {
            modelStatus.textContent = '未返回任何模型';
            modelStatus.style.color = '#b5544a';
            return;
          }
          modelSelect.innerHTML = '<option value="">手动输入模型名 ↓</option>' +
            list.map(m => {
              const id = m.id || m.name || m;
              return `<option value="${id}">${id}</option>`;
            }).join('');
          modelStatus.textContent = `已拉取 ${list.length} 个模型`;
          modelStatus.style.color = '#5c8a6b';
        } catch(e) {
          modelStatus.textContent = '响应解析失败';
          modelStatus.style.color = '#b5544a';
        }
      } else {
        modelStatus.textContent = 'HTTP ' + xhr.status + ' 请求失败';
        modelStatus.style.color = '#b5544a';
      }
    };
    xhr.onerror = () => { modelStatus.textContent = '网络错误'; modelStatus.style.color = '#b5544a'; };
    xhr.ontimeout = () => { modelStatus.textContent = '请求超时'; modelStatus.style.color = '#b5544a'; };
    xhr.send();
  });

  modelSelect.addEventListener('change', () => {
    if (modelSelect.value) document.getElementById('apiModel').value = modelSelect.value;
  });

  // ── Navigation ──
  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = '../main.html';
  });

  renderFeed();
  renderObserve();
  renderHeartbeat();
})();
</script>

</body>
</html>
