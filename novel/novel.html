<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>阅读 · 小手机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'PingFang SC', sans-serif;
      background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 0;
    }

    .app-container {
      width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
      background: #ffffff; display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,0.05); overflow: hidden; position: relative;
    }

    .header {
      display: flex; align-items: center; padding: 12px 16px;
      background: #ffffff; border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
    }
    .header-title { font-size: 18px; font-weight: 620; color: #1d1d1f; flex: 1; text-align: center; }
    .add-btn {
      background: #1d1d1f; color: #fff; border: none; border-radius: 18px;
      padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
      flex-shrink: 0;
    }

    .content {
      flex: 1; overflow-y: auto; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .novel-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px; background: #ffffff; border: 1px solid #f0f0f0;
      border-radius: 18px; cursor: pointer; transition: all 0.1s;
      user-select: none;
    }
    .novel-item:hover { background: #fafafa; }
    .novel-item:active { background: #f5f5f5; }
    .novel-title { font-size: 15px; font-weight: 500; color: #1d1d1f; }
    .novel-time { font-size: 11px; color: #c7c7cc; }
    .novel-arrow { font-size: 16px; color: #c7c7cc; }

    .empty-hint {
      text-align: center; color: #c7c7cc; font-size: 14px;
      padding: 60px 20px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
  <button id="backBtn" style="background:none;border:none;font-size:22px;cursor:pointer;padding:0 8px;flex-shrink:0;color:#1d1d1f;">←</button>
  <div class="header-title">阅读</div>
  <button class="add-btn" id="addBtn">＋ 添加</button>
</div>

  <div class="content" id="novelList"></div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'novel_list';

  function loadNovels() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
  }
  function saveNovels(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  const container = document.getElementById('novelList');

  function render() {
    const novels = loadNovels();

document.getElementById('backBtn').addEventListener('click', () => {
  window.location.href = '../main.html';
});

    if (novels.length === 0) {
      container.innerHTML = '<div class="empty-hint">暂无阅读项目<br>点击右上角添加</div>';
      return;
    }

    novels.sort((a, b) => b.updatedAt - a.updatedAt);

    container.innerHTML = novels.map(n => `
      <div class="novel-item" data-id="${n.id}">
        <div>
          <div class="novel-title">${escapeHtml(n.title || '未命名')}</div>
          <div class="novel-time">${formatTime(n.updatedAt)}</div>
        </div>
        <span class="novel-arrow">›</span>
      </div>
    `).join('');

    // 绑定事件
    container.querySelectorAll('.novel-item').forEach(item => {
      let clickTimer = null;

      item.addEventListener('click', () => {
        const id = item.getAttribute('data-id');
        if (clickTimer) {
          // 双击 → 指令.html
          clearTimeout(clickTimer);
          clickTimer = null;
          window.location.href = `指令.html?id=${id}`;
        } else {
          // 单击 → 互动.html（延迟判断）
          clickTimer = setTimeout(() => {
            clickTimer = null;
            window.location.href = `互动.html?id=${id}`;
          }, 300);
        }
      });
    });
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return (d.getMonth()+1)+'月'+d.getDate()+'日 ' + d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }

  function escapeHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 添加按钮
  document.getElementById('addBtn').addEventListener('click', () => {
    const novel = {
      id: Date.now().toString(),
      title: '',
      instruction: '',
      updatedAt: Date.now()
    };
    const novels = loadNovels();
    novels.push(novel);
    saveNovels(novels);
    window.location.href = `指令.html?id=${novel.id}`;
  });

  render();
})();
</script>
</body>
</html>
