html { height: 100%; background: #fafafa; }

body {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  width: 100%;
  background: #fafafa;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  color: #1a1a1a;
  overflow: hidden;
}

.page {
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  padding-top: calc(env(safe-area-inset-top, 44px) + 6px);
  padding-bottom: env(safe-area-inset-bottom, 20px);
  background: #fafafa;
}

/* ── 顶栏 ── */
.topbar {
  display: flex; align-items: center;
  padding: 10px 20px 16px;
  flex-shrink: 0;
}
.back-btn {
  width: 36px; height: 36px;
  background: #f0f0f0;
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; color: #1a1a1a; cursor: pointer;
  transition: background .15s; flex-shrink: 0;
}
.back-btn:active { background: #e0e0e0; }
.topbar-title {
  flex: 1; text-align: center;
  font-size: 16px; font-weight: 600;
  color: #1a1a1a; letter-spacing: -0.01em;
}
.topbar-right { width: 36px; }

/* ── 收款人头像区 ── */
.body-wrap {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 22px 20px;
  overflow-y: auto;
}

.recipient-area {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 28px; gap: 8px;
}
.recipient-avatar {
  width: 64px; height: 64px; border-radius: 22px;
  background: linear-gradient(145deg, #f0f0f0, #e8e8e8);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.recipient-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.recipient-name {
  font-size: 15px; font-weight: 600; color: #1a1a1a;
  letter-spacing: -0.01em;
}
.recipient-sub {
  font-size: 12px; color: #bbb;
}

/* ── 卡片 ── */
.card {
  width: 100%; background: #fff; border-radius: 20px;
  border: 1px solid #efefef;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  margin-bottom: 12px; overflow: hidden;
}

/* 金额区 */
.amount-section { padding: 20px 20px 18px; }
.section-label {
  font-size: 11.5px; font-weight: 600; color: #bbb;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 12px;
}
.amount-row {
  display: flex; align-items: baseline; gap: 4px;
  border-bottom: 1.5px solid #f0f0f0; padding-bottom: 12px;
}
.cny-symbol {
  font-size: 22px; color: #1a1a1a; font-weight: 400; margin-bottom: 2px;
}
.amount-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 42px; font-weight: 300; color: #1a1a1a;
  letter-spacing: -0.03em; caret-color: #888;
  font-family: inherit; min-width: 0;
}
.amount-input::placeholder { color: #e0e0e0; font-weight: 300; }
.amount-input::-webkit-outer-spin-button,
.amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.amount-input[type=number] { -moz-appearance: textfield; }

/* 备注行 */
.note-row {
  display: flex; align-items: center; gap: 10px;
  padding: 15px 20px;
  border-top: 1px solid #f5f5f5;
}
.note-icon { font-size: 15px; flex-shrink: 0; }
.note-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 14.5px; color: #555;
  font-family: inherit; caret-color: #888;
}
.note-input::placeholder { color: #ccc; }

/* ── 快捷金额 ── */
.quick-amounts {
  width: 100%; display: flex; gap: 8px; margin-bottom: 12px;
}
.quick-btn {
  flex: 1; padding: 10px 0;
  background: #fff; border: 1.5px solid #efefef; border-radius: 14px;
  font-size: 13.5px; color: #555; cursor: pointer;
  font-family: inherit; font-weight: 500;
  transition: all .15s;
}
.quick-btn:active, .quick-btn.active {
  background: #f5f5f5; border-color: #ccc; color: #1a1a1a;
}

/* ── 转账说明小字 ── */
.transfer-info {
  width: 100%; background: #fff; border-radius: 16px;
  border: 1px solid #efefef; padding: 14px 16px;
  margin-bottom: 18px;
  display: flex; flex-direction: column; gap: 9px;
}
.info-row {
  display: flex; align-items: center; justify-content: space-between;
}
.info-key { font-size: 13px; color: #bbb; }
.info-val { font-size: 13px; color: #555; font-weight: 500; }

/* ── 发送按钮 ── */
.send-btn {
  width: 100%; padding: 16px;
  background: #1a1a1a;
  border: none; border-radius: 50px; cursor: pointer;
  font-size: 16px; font-weight: 600; color: #fff;
  letter-spacing: 0.01em;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transition: opacity .15s, transform .1s; flex-shrink: 0;
  margin-bottom: 10px;
}
.send-btn:active { transform: scale(0.97); opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

.hint {
  font-size: 11.5px; color: #ccc; text-align: center;
}

/* ── 面容 ID 遮罩 ── */
.faceid-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(250,250,250,0.9);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity .2s, visibility .2s;
}
.faceid-overlay.show { opacity: 1; visibility: visible; }

.faceid-box {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
}
.faceid-frame { width: 120px; height: 120px; position: relative; }
.faceid-frame svg { width: 100%; height: 100%; }
.scan-line {
  position: absolute; left: 16px; right: 16px; height: 2px;
  background: linear-gradient(90deg, transparent, #1a1a1a, transparent);
  border-radius: 1px; top: 16px;
  animation: scanMove 1.4s ease-in-out infinite;
}
@keyframes scanMove {
  0%   { top: 16px; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: 104px; opacity: 0; }
}
.faceid-title {
  font-size: 18px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.01em;
}
.faceid-sub { font-size: 13.5px; color: #aaa; margin-top: -10px; }

/* 成功 */
.faceid-success {
  display: none; flex-direction: column; align-items: center; gap: 14px;
}
.success-circle {
  width: 72px; height: 72px; border-radius: 50%;
  background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: white;
  animation: successPop .4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}
@keyframes successPop {
  0%   { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}
.success-title { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.success-sub   { font-size: 14px; color: #aaa; margin-top: -6px; }

<div class="faceid-overlay" id="faceidOverlay">
  <div class="faceid-box" id="faceidScanning">
    <div class="faceid-frame">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 36 L16 16 L36 16" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <path d="M84 16 L104 16 L104 36" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <path d="M104 84 L104 104 L84 104" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <path d="M36 104 L16 104 L16 84" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="60" cy="55" rx="20" ry="24" stroke="#ddd" stroke-width="1.5"/>
        <circle cx="51" cy="50" r="3" fill="#ddd"/>
        <circle cx="69" cy="50" r="3" fill="#ddd"/>

      </svg>

  </div>

    <div class="success-circle">✓</div>
    <div class="success-title">转账成功</div>
    <div class="success-sub" id="successAmount"></div>
  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const charId = params.get('id');

  /* 返回 */
  document.getElementById('backBtn').addEventListener('click', () => {
    if (charId) window.location.href = '../chat/chat/chat.html?id=' + charId;
    else history.back();
  });

  /* 读取角色信息，填收款人 */
  function loadCharInfo() {
    try {
      const chars = JSON.parse(localStorage.getItem('chat_characters')) || [];
      const char  = chars.find(c => String(c.id) === String(charId));
      if (!char) return;
      document.getElementById('recipientName').textContent = char.name || '对方';
      document.getElementById('infoName').textContent      = char.name || '对方';
      const avatarEl = document.getElementById('recipientAvatar');
      if (char.avatar) {
        avatarEl.innerHTML = `<img src="${char.avatar}" alt="">`;
      } else {
        avatarEl.textContent = (char.name || '?').charAt(0);
        avatarEl.style.fontSize = '24px';
        avatarEl.style.fontWeight = '600';
        avatarEl.style.color = '#888';
        avatarEl.style.background = '#f0f0f0';
      }
    } catch {}
  }
  loadCharInfo();

  /* 快捷金额 */
  const amountInput = document.getElementById('amountInput');
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      amountInput.value = btn.getAttribute('data-val');
      document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  amountInput.addEventListener('input', () => {
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  });

  /* IndexedDB */
  const DB_NAME = 'FiN_DB', DB_VER = 1, STORE = 'chat_messages';
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE))
          db.createObjectStore(STORE, { keyPath: 'id' });
      };
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e.target.error);
    });
  }
  async function loadMessages() {
    try {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx  = db.transaction(STORE, 'readonly');
        const req = tx.objectStore(STORE).get('chat_msg_' + charId);
        req.onsuccess = () => res(req.result?.messages || []);
        req.onerror   = () => rej(req.error);
        tx.oncomplete = () => db.close();
      });
    } catch { return []; }
  }
  async function saveMessages(msgs) {
    try {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put({ id: 'chat_msg_' + charId, messages: msgs });
        tx.oncomplete = () => { db.close(); res(); };
        tx.onerror    = () => rej(tx.error);
      });
    } catch {}
  }
  function updateCharLastMsg(text) {
    try {
      const chars = JSON.parse(localStorage.getItem('chat_characters')) || [];
      const idx   = chars.findIndex(c => String(c.id) === String(charId));
      if (idx !== -1) {
        chars[idx].lastMessage = text;
        const d = new Date();
        chars[idx].time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        localStorage.setItem('chat_characters', JSON.stringify(chars));
      }
    } catch {}
  }

  async function sendTransfer(amount, note) {
    if (!charId) return;
    const msgs = await loadMessages();
    const d    = new Date();
    const time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    msgs.push({
      type:      'transfer',
      sender:    'self',
      text:      note || '转账',
      note:      note || '转账',
      amount:    parseFloat(amount).toFixed(2),
      timestamp: Date.now(),
      time
    });
    await saveMessages(msgs);
    updateCharLastMsg('[转账] ¥' + parseFloat(amount).toFixed(2));
  }

  /* 面容 ID */
  const overlay  = document.getElementById('faceidOverlay');
  const scanning = document.getElementById('faceidScanning');
  const success  = document.getElementById('faceidSuccess');

  function showScanning() {
    scanning.style.display = 'flex';
    success.style.display  = 'none';
    overlay.classList.add('show');
  }
  function showSuccess(amount) {
    scanning.style.display = 'none';
    success.style.display  = 'flex';
    document.getElementById('successAmount').textContent = '¥ ' + parseFloat(amount).toFixed(2) + ' 已转出';
  }

  /* 主流程 */
  const noteInput = document.getElementById('noteInput');
  const sendBtn   = document.getElementById('sendBtn');

  amountInput.addEventListener('blur', () => {
    const v = parseFloat(amountInput.value);
    if (!isNaN(v) && v > 0) amountInput.value = Math.min(v, 50000).toFixed(2);
  });

  sendBtn.addEventListener('click', async () => {
    const raw    = amountInput.value.trim();
    const amount = parseFloat(raw);
    if (!raw || isNaN(amount) || amount <= 0) {
      amountInput.focus();
      amountInput.style.color = '#999';
      setTimeout(() => { amountInput.style.color = ''; }, 700);
      return;
    }
    if (amount > 50000) { alert('单笔转账限额 ¥50,000.00'); return; }
    if (!charId) { alert('找不到聊天对象，请从聊天页面进入'); return; }

    const note = noteInput.value.trim();
    sendBtn.disabled = true;

    showScanning();
    setTimeout(() => showSuccess(amount), 1600);
    setTimeout(async () => {
      await sendTransfer(amount, note);
      window.location.href = '../chat/chat/chat.html?id=' + charId;
    }, 2750);
  });

  overlay.addEventListener('click', e => {
    if (e.target === overlay && scanning.style.display !== 'none') {
      overlay.classList.remove('show');
      sendBtn.disabled = false;
    }
  });
})();
</script>
