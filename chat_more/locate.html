<!DOCTYPE html>

<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>位置</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html { height: 100%; background: #fafafa; }
    body {
      min-height: 100vh; min-height: -webkit-fill-available;
      width: 100%; background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      color: #1a1a1a; overflow: hidden;
    }
    .page {
      max-width: 420px; margin: 0 auto;
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; flex-direction: column;
      padding-top: calc(env(safe-area-inset-top, 44px) + 6px);
      padding-bottom: env(safe-area-inset-bottom, 20px);
      background: #fafafa;
    }

/* 顶栏 */
.topbar {
  display: flex; align-items: center;
  padding: 10px 20px 16px; flex-shrink: 0;
}
.back-btn {
  width: 36px; height: 36px; background: #f0f0f0;
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; color: #1a1a1a; cursor: pointer;
  transition: background .15s; flex-shrink: 0;
}
.back-btn:active { background: #e0e0e0; }
.topbar-title {
  flex: 1; text-align: center; font-size: 16px; font-weight: 600;
  color: #1a1a1a; letter-spacing: -0.01em;
}
.topbar-right { width: 36px; }

/* 伪地图 */
.map-area {
  width: calc(100% - 44px); margin: 0 22px 16px;
  height: 180px; border-radius: 20px; overflow: hidden;
  position: relative; flex-shrink: 0;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
}
.map-canvas {
  width: 100%; height: 100%;
  background:
    linear-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.35) 1px, transparent 1px),
    linear-gradient(145deg, #dce4ed 0%, #c8d4e0 50%, #d4dde8 100%);
  background-size: 32px 32px, 32px 32px, 100% 100%;
}
.map-road-h {
  position: absolute; left: 0; right: 0; height: 11px;
  background: rgba(255,255,255,0.5);
}
.map-road-v {
  position: absolute; top: 0; bottom: 0; width: 9px;
  background: rgba(255,255,255,0.5);
}
.accuracy-ring {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(26,26,26,0.07);
  border: 1.5px solid rgba(26,26,26,0.13);
}
.map-pin {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -100%);
  display: flex; flex-direction: column; align-items: center;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.22));
}
.pin-body {
  width: 32px; height: 32px; border-radius: 50% 50% 50% 0;
  background: #1a1a1a; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
}
.pin-body::after {
  content: ''; width: 12px; height: 12px; border-radius: 50%;
  background: #fff; transform: rotate(45deg);
}
.pin-shadow {
  width: 9px; height: 4px; border-radius: 50%;
  background: rgba(0,0,0,0.14); margin-top: 2px;
}
/* 地图右下角当前位置小标签 */
.map-badge {
  position: absolute; bottom: 10px; left: 12px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border-radius: 10px; padding: 5px 10px;
  font-size: 11.5px; color: #555; font-weight: 500;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* 主体 */
.body-wrap {
  flex: 1; display: flex; flex-direction: column;
  padding: 0 22px 0; overflow-y: auto;
}

.section-label {
  font-size: 11.5px; font-weight: 600; color: #bbb;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px;
}

/* 输入卡片 */
.card {
  width: 100%; background: #fff; border-radius: 20px;
  border: 1px solid #efefef;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  margin-bottom: 12px; overflow: hidden;
}
.input-row {
  display: flex; align-items: center; gap: 12px;
  padding: 15px 18px;
  border-bottom: 1px solid #f5f5f5;
}
.input-row:last-child { border-bottom: none; }
.row-icon { font-size: 17px; flex-shrink: 0; }
.row-content { flex: 1; min-width: 0; }
.row-label {
  font-size: 11px; color: #bbb; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 3px;
}
.row-input {
  width: 100%; background: none; border: none; outline: none;
  font-size: 15px; color: #1a1a1a; font-family: inherit;
  caret-color: #888;
}
.row-input::placeholder { color: #ccc; }
.row-input.large {
  font-size: 17px; font-weight: 500;
}

/* 预设地点 */
.preset-label {
  font-size: 11.5px; font-weight: 600; color: #bbb;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px;
}
.preset-list {
  background: #fff; border-radius: 20px;
  border: 1px solid #efefef;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  overflow: hidden; margin-bottom: 18px;
}
.preset-item {
  display: flex; align-items: center; gap: 13px;
  padding: 13px 18px; cursor: pointer;
  border-bottom: 1px solid #f5f5f5;
  transition: background .12s;
}
.preset-item:last-child { border-bottom: none; }
.preset-item:active { background: #fafafa; }
.preset-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #e0e0e0; flex-shrink: 0;
}
.preset-info { flex: 1; min-width: 0; }
.preset-name {
  font-size: 14px; color: #1a1a1a; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.preset-addr {
  font-size: 12px; color: #bbb; margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.preset-arrow { font-size: 13px; color: #ddd; flex-shrink: 0; }

/* 发送按钮 */
.send-btn {
  width: 100%; padding: 16px; background: #1a1a1a;
  border: none; border-radius: 50px; cursor: pointer;
  font-size: 16px; font-weight: 600; color: #fff;
  letter-spacing: 0.01em;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transition: opacity .15s, transform .1s;
  margin-bottom: 10px; flex-shrink: 0;
}
.send-btn:active { transform: scale(0.97); opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
.hint { font-size: 11.5px; color: #ccc; text-align: center; }

/* 成功遮罩 */
.sent-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(250,250,250,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  opacity: 0; visibility: hidden;
  transition: opacity .2s, visibility .2s;
}
.sent-overlay.show { opacity: 1; visibility: visible; }
.sent-circle {
  width: 72px; height: 72px; border-radius: 50%;
  background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: white;
  animation: successPop .4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}
@keyframes successPop {
  0%   { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}
.sent-title { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.sent-sub   { font-size: 14px; color: #aaa; }

  </style>
</head>
<body>
<div class="page">

  <!-- 顶栏 -->

  <div class="topbar">
    <button class="back-btn" id="backBtn">←</button>
    <div class="topbar-title">发送位置</div>
    <div class="topbar-right"></div>
  </div>

  <!-- 伪地图 -->

  <div class="map-area">
    <div class="map-canvas"></div>
    <div class="map-road-h" style="top:36%;"></div>
    <div class="map-road-h" style="top:66%;"></div>
    <div class="map-road-v" style="left:28%;"></div>
    <div class="map-road-v" style="left:62%;"></div>
    <div class="accuracy-ring"></div>
    <div class="map-pin">
      <div class="pin-body"></div>
      <div class="pin-shadow"></div>
    </div>
    <div class="map-badge" id="mapBadge">输入地点名称…</div>
  </div>

  <div class="body-wrap">

<!-- 手动输入 -->
<div class="section-label">位置信息</div>
<div class="card">
  <div class="input-row">
    <span class="row-icon">📍</span>
    <div class="row-content">
      <div class="row-label">地点名称</div>
      <input class="row-input large" id="locName" type="text"
        placeholder="例：星巴克三里屯店" maxlength="40">
    </div>
  </div>
  <div class="input-row">
    <span class="row-icon">🗺</span>
    <div class="row-content">
      <div class="row-label">详细地址</div>
      <input class="row-input" id="locAddr" type="text"
        placeholder="例：北京市朝阳区三里屯路 19 号" maxlength="60">
    </div>
  </div>
</div>

<!-- 预设快捷地点 -->
<div class="preset-label">快速选择</div>
<div class="preset-list" id="presetList"></div>

<button class="send-btn" id="sendBtn">发送位置</button>
<div class="hint">对方将收到你填写的位置</div>

  </div>
</div>

<!-- 成功遮罩 -->

<div class="sent-overlay" id="sentOverlay">
  <div class="sent-circle">✓</div>
  <div class="sent-title">位置已发送</div>
  <div class="sent-sub" id="sentLocName"></div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const charId = params.get('id');

  document.getElementById('backBtn').addEventListener('click', () => {
    if (charId) window.location.href = '../chat/chat/chat.html?id=' + charId;
    else history.back();
  });

  /* 地图小标签实时跟随输入 */
  const locNameInput = document.getElementById('locName');
  const locAddrInput = document.getElementById('locAddr');
  const mapBadge     = document.getElementById('mapBadge');

  function updateBadge() {
    const n = locNameInput.value.trim();
    const a = locAddrInput.value.trim();
    mapBadge.textContent = n || a || '输入地点名称…';
  }
  locNameInput.addEventListener('input', updateBadge);
  locAddrInput.addEventListener('input', updateBadge);

  /* 预设地点 */
  const PRESETS = [
    { name: '家',           addr: '我家' },
    { name: '公司 / 学校',  addr: '工作或学习的地方' },
    { name: '咖啡店',       addr: '附近的咖啡馆' },
    { name: '商场',         addr: '附近的购物中心' },
    { name: '公园',         addr: '附近的公园' },
  ];

  const presetList = document.getElementById('presetList');
  PRESETS.forEach(p => {
    const item = document.createElement('div');
    item.className = 'preset-item';
    item.innerHTML = `
      <div class="preset-dot"></div>
      <div class="preset-info">
        <div class="preset-name">${p.name}</div>
        <div class="preset-addr">${p.addr}</div>
      </div>
      <span class="preset-arrow">›</span>
    `;
    item.addEventListener('click', () => {
      locNameInput.value = p.name;
      locAddrInput.value = p.addr;
      updateBadge();
      locNameInput.focus();
    });
    presetList.appendChild(item);
  });

  /* IndexedDB */
  const DB_NAME = 'FiN_DB', DB_VER = 1, STORE = 'chat_messages';
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE))
          db.createObjectStore(STORE, { keyPath: 'id' });
      };
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e.target.error);
    });
  }
  async function loadMessages() {
    try {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx  = db.transaction(STORE, 'readonly');
        const req = tx.objectStore(STORE).get('chat_msg_' + charId);
        req.onsuccess = () => res(req.result?.messages || []);
        req.onerror   = () => rej(req.error);
        tx.oncomplete = () => db.close();
      });
    } catch { return []; }
  }
  async function saveMessages(msgs) {
    try {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put({ id: 'chat_msg_' + charId, messages: msgs });
        tx.oncomplete = () => { db.close(); res(); };
        tx.onerror    = () => rej(tx.error);
      });
    } catch {}
  }
  function updateCharLastMsg(text) {
    try {
      const chars = JSON.parse(localStorage.getItem('chat_characters')) || [];
      const idx   = chars.findIndex(c => String(c.id) === String(charId));
      if (idx !== -1) {
        chars[idx].lastMessage = text;
        const d = new Date();
        chars[idx].time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        localStorage.setItem('chat_characters', JSON.stringify(chars));
      }
    } catch {}
  }

  async function sendLocation(name, addr) {
    if (!charId) return;
    const msgs = await loadMessages();
    const d    = new Date();
    const time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    msgs.push({
      type:         'location',
      sender:       'self',
      text:         name,
      locationName: name,
      locationAddr: addr,
      timestamp:    Date.now(),
      time
    });
    await saveMessages(msgs);
    updateCharLastMsg('[位置]');
  }

  /* 发送 */
  const sendBtn     = document.getElementById('sendBtn');
  const sentOverlay = document.getElementById('sentOverlay');

  sendBtn.addEventListener('click', async () => {
    const name = locNameInput.value.trim();
    const addr = locAddrInput.value.trim();

    if (!name) {
      locNameInput.focus();
      locNameInput.style.color = '#aaa';
      setTimeout(() => { locNameInput.style.color = ''; }, 700);
      return;
    }
    if (!charId) { alert('找不到聊天对象，请从聊天页面进入'); return; }

    sendBtn.disabled = true;
    document.getElementById('sentLocName').textContent = addr || name;
    sentOverlay.classList.add('show');

    setTimeout(async () => {
      await sendLocation(name, addr);
      window.location.href = '../chat/chat/chat.html?id=' + charId;
    }, 1400);
  });
})();
</script>

</body>
</html>
