<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FiN">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>桌面美化 · 小手机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 0;
    }

    .app-container {
      width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
      background: #ffffff; display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,0.05); overflow: hidden; position: relative;
    }

    .header {
      display: flex; align-items: center; padding: 10px 14px;
      background: #ffffff; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; gap: 10px;
    }
    .back-btn {
      background: none; border: none; font-size: 18px; cursor: pointer; color: #1d1d1f;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 620; color: #1d1d1f; flex: 1; text-align: center; }

    .content {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .section {
      border: 1px solid #f0f0f0; border-radius: 20px; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .section-title {
      font-size: 12px; font-weight: 600; color: #8e8e93;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .hint { font-size: 12px; color: #8e8e93; line-height: 1.4; }

    .upload-row {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .preview-img {
      width: 56px; height: 56px; border-radius: 14px; overflow: hidden;
      background: #f2f2f6; border: 1px solid #f0f0f0; flex-shrink: 0;
    }
    .preview-img img { width: 100%; height: 100%; object-fit: cover; }

    .btn {
      padding: 10px 16px; border-radius: 14px; border: none; font-size: 13px;
      font-weight: 500; cursor: pointer; background: #f2f2f6; color: #1d1d1f;
    }
    .btn-dark { background: #1d1d1f; color: #fff; }
    .hidden-file-input { display: none; }

    textarea.input-field {
      border: 1px solid #e5e5ea; border-radius: 14px; padding: 12px;
      font-size: 13px; outline: none; width: 100%; background: #f9f9fb;
      resize: vertical; min-height: 100px; font-family: 'Courier New', monospace;
      line-height: 1.4;
    }

    .page-list { display: flex; flex-direction: column; gap: 6px; }
    .page-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #f9f9fb; border-radius: 14px;
    }
    .page-row span { font-size: 14px; color: #1d1d1f; }
    .page-row button {
      background: none; border: none; color: #ff3b30; font-size: 13px;
      cursor: pointer; font-weight: 500;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <button class="back-btn" id="backBtn">←</button>
    <div class="header-title">桌面美化</div>
  </div>

  <div class="content">
    <!-- 壁纸 -->
    <div class="section">
      <div class="section-title">壁纸</div>
      <div class="hint">自定义主屏幕背景图片</div>
      <div class="upload-row">
        <div class="preview-img" id="wallpaperPreview"><img id="wallpaperImg" src="" alt="" style="display:none;"></div>
        <button class="btn" id="uploadWallpaperBtn">上传壁纸</button>
        <button class="btn" id="resetWallpaperBtn">恢复默认</button>
      </div>
      <input type="file" accept="image/*" id="wallpaperFileInput" class="hidden-file-input">
    </div>

    <!-- 图标 -->
    <div class="section">
      <div class="section-title">应用图标</div>
      <div class="hint">点击上传替换对应APP图标</div>
      <div class="upload-row" id="iconList"></div>
<button class="btn" id="resetIconsBtn" style="margin-top:6px;">恢复全部默认图标</button>
    </div>

    <!-- 自定义小组件 -->
    <div class="section">
      <div class="section-title">自定义小组件</div>
      <div class="hint">填写HTML/CSS/JS代码，保存后添加到主屏幕</div>
      <textarea class="input-field" id="widgetCode" placeholder="<div style='padding:16px;background:#fff;border-radius:20px;'>✨ 自定义小组件</div>"></textarea>
      <button class="btn btn-dark" id="saveWidgetBtn">保存小组件</button>
      <button class="btn" id="manageWidgetsBtn">管理已保存的小组件</button>
    </div>

    <!-- 页面管理 -->
    <div class="section">
      <div class="section-title">页面管理</div>
      <div class="hint">添加或删除主屏幕页面（当前页数：<span id="pageCount">2</span>）</div>
      <div class="page-list" id="pageList">
        <div class="page-row"><span>第1页</span><span style="color:#8e8e93;">不可删除</span></div>
        <div class="page-row"><span>第2页</span><span style="color:#8e8e93;">不可删除</span></div>
      </div>
      <button class="btn btn-dark" id="addPageBtn">＋ 添加页面</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ★ 返回键放最前面
  document.getElementById('backBtn').onclick = function() {
    window.location.href = '../main.html';
  };

  // 壁纸
  function loadWallpaper() {
    const wp = localStorage.getItem('wallpaper');
    if (wp) {
      document.getElementById('wallpaperImg').src = wp;
      document.getElementById('wallpaperImg').style.display = 'block';
    }
  }
  loadWallpaper();

  document.getElementById('uploadWallpaperBtn').addEventListener('click', () => {
    document.getElementById('wallpaperFileInput').click();
  });
  document.getElementById('wallpaperFileInput').addEventListener('change', (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      localStorage.setItem('wallpaper', ev.target.result);
      document.getElementById('wallpaperImg').src = ev.target.result;
      document.getElementById('wallpaperImg').style.display = 'block';
    };
    r.readAsDataURL(f);
  });
  document.getElementById('resetWallpaperBtn').addEventListener('click', () => {
    localStorage.removeItem('wallpaper');
    document.getElementById('wallpaperImg').style.display = 'none';
  });

  // 图标
  const appNames = ['phone','diary','music','novel','forum','takeout','plan','momo','make','album','calendar'];
  const iconList = document.getElementById('iconList');
  appNames.forEach(name => {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;';
    div.innerHTML = `
      <div class="preview-img" id="icon_prev_${name}"><img id="icon_img_${name}" src="" style="display:none;"></div>
      <span style="font-size:10px;color:#8e8e93;">${name}</span>
    `;
    div.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = (e) => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = ev => {
          localStorage.setItem(`icon_${name}`, ev.target.result);
          document.getElementById(`icon_img_${name}`).src = ev.target.result;
          document.getElementById(`icon_img_${name}`).style.display = 'block';
        };
        r.readAsDataURL(f);
      };
      input.click();
    });
    const saved = localStorage.getItem(`icon_${name}`);
    if (saved) {
      setTimeout(() => {
        const img = document.getElementById(`icon_img_${name}`);
        if (img) { img.src = saved; img.style.display = 'block'; }
      }, 100);
    }
    iconList.appendChild(div);
  });

  // 自定义小组件
  document.getElementById('saveWidgetBtn').addEventListener('click', () => {
    const code = document.getElementById('widgetCode').value.trim();
    if (!code) { alert('请输入代码'); return; }
    const widgets = JSON.parse(localStorage.getItem('custom_widgets') || '[]');
    widgets.push({ code, time: Date.now() });
    localStorage.setItem('custom_widgets', JSON.stringify(widgets));
    alert('已保存');
    document.getElementById('widgetCode').value = '';
  });
  document.getElementById('manageWidgetsBtn').addEventListener('click', () => {
    const widgets = JSON.parse(localStorage.getItem('custom_widgets') || '[]');
    if (widgets.length === 0) { alert('暂无保存的小组件'); return; }
    let list = widgets.map((w, i) => `${i+1}. ${w.code.substring(0,30)}...`).join('\n');
    const act = prompt(`已保存的小组件：\n${list}\n\n输入序号删除，或输入0取消`);
    if (act && parseInt(act) > 0) {
      const idx = parseInt(act) - 1;
      if (idx < widgets.length) {
        widgets.splice(idx, 1);
        localStorage.setItem('custom_widgets', JSON.stringify(widgets));
        alert('已删除');
      }
    }
  });

  // 页面管理
  function loadPages() {
    const pages = JSON.parse(localStorage.getItem('custom_pages') || '[]');
    document.getElementById('pageCount').textContent = 2 + pages.length;
    const pageList = document.getElementById('pageList');
    pageList.innerHTML = `
      <div class="page-row"><span>第1页</span><span style="color:#8e8e93;">不可删除</span></div>
      <div class="page-row"><span>第2页</span><span style="color:#8e8e93;">不可删除</span></div>
    `;
    pages.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'page-row';
      row.innerHTML = `<span>第${i+3}页（自定义）</span>`;
      const delBtn = document.createElement('button');
      delBtn.textContent = '删除';
      delBtn.addEventListener('click', () => {
        pages.splice(i, 1);
        localStorage.setItem('custom_pages', JSON.stringify(pages));
        loadPages();
      });
      row.appendChild(delBtn);
      pageList.appendChild(row);
    });
  }
  loadPages();

  document.getElementById('addPageBtn').addEventListener('click', () => {
    const pages = JSON.parse(localStorage.getItem('custom_pages') || '[]');
    pages.push({ widgets: [], time: Date.now() });
    localStorage.setItem('custom_pages', JSON.stringify(pages));
    loadPages();
    alert('已添加新页面，刷新主屏幕生效');
  });
// 恢复全部默认图标
  document.getElementById('resetIconsBtn').addEventListener('click', () => {
    if (!confirm('确定恢复所有图标为默认吗？')) return;
    appNames.forEach(name => {
      localStorage.removeItem(`icon_${name}`);
      const img = document.getElementById(`icon_img_${name}`);
      if (img) { img.style.display = 'none'; img.src = ''; }
    });
    alert('已恢复默认');
  });
})();
</script>
</body>
</html>
