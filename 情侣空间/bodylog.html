<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>身体日志 · 小手机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f4f3f0;
      --card: #ffffff;
      --blue: #c8d8e4;
      --apr: #f5e6d3;
      --neu: #edecea;
      --ink: #2c2c2e;
      --ink2: #636366;
      --ink3: #aeaeb2;
      --green: #34c759;
      --red: #ff3b30;
      --orange: #ff9500;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      width: 100vw; height: 100vh;
      overflow: hidden; display: flex; flex-direction: column;
      color: var(--ink);
    }

    .ss { height: var(--safe-top); flex-shrink: 0; }

    .topbar {
      display: flex; align-items: center;
      padding: 6px 16px; flex-shrink: 0;
    }
    .back-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 10px rgba(44,44,46,0.06);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
    }
    .topbar-title {
      flex: 1; text-align: center; font-size: 15px;
      font-weight: 600; letter-spacing: -0.2px; margin-right: 34px;
    }

    .scroll {
      flex: 1; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
      padding: 8px 16px calc(var(--safe-bottom) + 36px);
      scrollbar-width: none;
    }
    .scroll::-webkit-scrollbar { display: none; }

    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .card {
      background: var(--card); border-radius: 24px;
      border: 1px solid rgba(44,44,46,0.06);
      box-shadow: 0 4px 18px rgba(44,44,46,0.09);
      overflow: hidden; margin-bottom: 20px;
      animation: rise 0.5s ease forwards; opacity: 0;
    }

    .avatar-section {
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 20px 20px; gap: 10px;
    }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      overflow: hidden; cursor: pointer;
      background: linear-gradient(135deg, #e8e3f8, #d4cef5);
      border: 3px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      position: relative; animation: breathe 3.4s ease-in-out infinite;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: #fff;
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .status-dot {
      position: absolute; bottom: 3px; right: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #fff;
    }
    .status-dot.good { background: var(--green); }
    .status-dot.warn { background: var(--orange); }
    .status-dot.bad { background: var(--red); }

    .char-name {
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.3px; text-align: center;
    }

    .status-list {
      padding: 0 18px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .status-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid rgba(44,44,46,0.06);
    }
    .status-row:last-child { border-bottom: none; }
    .status-label { font-size: 13.5px; color: var(--ink); }
    .status-value {
      font-size: 13px; font-weight: 600;
      padding: 3px 10px; border-radius: 10px;
    }
    .val-good { background: #e8f5e9; color: #2e7d32; }
    .val-warn { background: #fff3e0; color: #e65100; }
    .val-bad { background: #ffebee; color: #c62828; }
    .val-neutral { background: #f2f2f5; color: var(--ink2); }

    .action-row {
      display: flex; gap: 10px;
      padding: 12px 18px 16px;
    }
    .action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 12px;
      border-radius: 14px; border: 1px dashed rgba(44,44,46,0.15);
      background: var(--neu); color: var(--ink2);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .action-btn:hover { background: #e0dfdb; color: var(--ink); }
    .action-btn:active { transform: scale(0.97); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .mini-chat-overlay {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.98);
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
      z-index: 50; display: flex; flex-direction: column;
      max-height: 350px; transition: transform 0.3s ease;
    }
    .mini-chat-overlay.show { transform: translateX(-50%) translateY(0); }
    .mini-chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid rgba(44,44,46,0.08);
    }
    .mini-chat-title { font-size: 14px; font-weight: 600; }
    .mini-chat-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); }
    .mini-chat-msgs {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px; max-height: 220px;
    }
    .mini-msg {
      padding: 8px 12px; border-radius: 14px; font-size: 13px;
      max-width: 80%; line-height: 1.4;
    }
    .mini-msg.other { background: #f2f2f5; align-self: flex-start; color: var(--ink); }
    .mini-msg.system { background: #fff3e0; align-self: center; color: #e65100; font-size: 11px; text-align: center; }
    .backdrop {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3); z-index: 49; display: none;
    }
    .backdrop.show { display: block; }

    .toast {
      position: fixed; bottom: calc(var(--safe-bottom) + 24px); left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(44,44,46,0.9); color: #fff;
      font-size: 13px; font-weight: 500; padding: 10px 22px;
      border-radius: 22px; white-space: nowrap;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="ss"></div>
<div class="topbar">
  <div class="back-btn" id="backBtn">‹</div>
  <div class="topbar-title">身体日志</div>
</div>
<div class="scroll">
  <div class="card" id="mainCard">
    <div class="avatar-section">
      <div class="avatar-circle" id="avatarCircle">
        <div class="avatar-placeholder">🤖</div>
        <img id="avatarImg" src="" style="display:none;">
        <div class="status-dot good" id="statusDot"></div>
      </div>
      <div class="char-name" id="charNameDisplay">角色</div>
    </div>
    <div class="status-list" id="statusList"></div>
    <div class="action-row">
      <button class="action-btn" id="checkStatusBtn">🩺 检查状态</button>
      <button class="action-btn" id="toyEntryBtn">🎮 小玩具控制</button>
    </div>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="mini-chat-overlay" id="miniChatOverlay">
  <div class="mini-chat-header">
    <span class="mini-chat-title" id="miniChatTitle">角色</span>
    <button class="mini-chat-close" id="miniChatClose">✕</button>
  </div>
  <div class="mini-chat-msgs" id="miniChatMsgs"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const charId = params.get('id');
  if (!charId) { alert('未指定角色，请从情侣空间进入'); window.location.href = '主页.html'; return; }

  function getCharacters() { try { return JSON.parse(localStorage.getItem('chat_characters') || '[]'); } catch(e) { return []; } }
  function loadWorldbooks() { try { return JSON.parse(localStorage.getItem('worldbooks') || '[]'); } catch(e) { return []; } }
  const char = getCharacters().find(c => c.id == charId);
  if (!char) { alert('角色数据未找到'); window.location.href = '主页.html'; return; }

  function getApiConfig() {
    return {
      endpoint: localStorage.getItem('ai_base_url') || '',
      key: localStorage.getItem('ai_api_key') || '',
      model: localStorage.getItem('ai_model') || 'gpt-3.5-turbo'
    };
  }

  function getBodyLog() { try { return JSON.parse(localStorage.getItem('body_log_' + charId)) || {}; } catch(e) { return {}; } }
  function saveBodyLog(data) { localStorage.setItem('body_log_' + charId, JSON.stringify(data)); }

  let bodyLog = getBodyLog();
  if (!bodyLog.initialized) {
    bodyLog = { temperature: 36.8, sick: '健康', canWalk: true, anusState: '正常', toyEquipped: false, toyPower: 0, initialized: true };
    saveBodyLog(bodyLog);
  }

  document.getElementById('charNameDisplay').textContent = char.name || '角色';
  document.getElementById('miniChatTitle').textContent = char.name || '角色';
  if (char.avatar) {
    document.getElementById('avatarImg').src = char.avatar;
    document.getElementById('avatarImg').style.display = 'block';
    document.querySelector('.avatar-placeholder').style.display = 'none';
  }

  function getOverallStatus() {
    if ((bodyLog.sick && bodyLog.sick !== '健康') || !bodyLog.canWalk || bodyLog.anusState !== '正常') return 'bad';
    if (bodyLog.temperature > 37.5 || bodyLog.toyEquipped) return 'warn';
    return 'good';
  }
  function updateStatusDot() { document.getElementById('statusDot').className = 'status-dot ' + getOverallStatus(); }
  updateStatusDot();

  function renderStatus() {
    const items = [
      { label: '体温', value: bodyLog.temperature + '°C', cls: bodyLog.temperature > 37.5 ? 'val-warn' : 'val-good' },
      { label: '健康状况', value: bodyLog.sick || '健康', cls: (bodyLog.sick && bodyLog.sick !== '健康') ? 'val-bad' : 'val-good' },
      { label: '行走能力', value: bodyLog.canWalk ? '正常' : '困难', cls: bodyLog.canWalk ? 'val-good' : 'val-warn' },
      { label: '后穴状态', value: bodyLog.anusState || '正常', cls: bodyLog.anusState === '正常' ? 'val-good' : (bodyLog.anusState === '轻微外翻' ? 'val-warn' : 'val-bad') },
      { label: '小玩具', value: bodyLog.toyEquipped ? '已佩戴' : '未佩戴', cls: bodyLog.toyEquipped ? 'val-warn' : 'val-neutral' }
    ];
    document.getElementById('statusList').innerHTML = items.map(i => `
      <div class="status-row"><span class="status-label">${i.label}</span><span class="status-value ${i.cls}">${i.value}</span></div>
    `).join('');
  }
  renderStatus();

  function getRelevantWorldbooks() {
    const all = loadWorldbooks();
    return all.filter(b => b.isGlobal || (b.characters && b.characters.includes(charId)));
  }
  function buildWorldbookContext() {
    const books = getRelevantWorldbooks();
    return books.length ? '【世界书设定】\n' + books.map(b => `《${b.name}》：${b.content}`).join('\n') : '';
  }

  // ★ 从 IndexedDB 读取聊天记录
  async function loadChatHistory() {
    return new Promise((resolve) => {
      try {
        const DB_NAME = 'FiN_DB';
        const request = indexedDB.open(DB_NAME, 1);
        request.onsuccess = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('chat_messages')) { db.close(); resolve([]); return; }
          const tx = db.transaction('chat_messages', 'readonly');
          const store = tx.objectStore('chat_messages');
          const req = store.get(`chat_msg_${charId}`);
          req.onsuccess = () => {
            const msgs = req.result?.messages || [];
            db.close();
            resolve(msgs.filter(m => m.type !== 'system').slice(-100));
          };
          req.onerror = () => { db.close(); resolve([]); };
        };
        request.onerror = () => resolve([]);
      } catch(e) { resolve([]); }
    });
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2000);
  }

  async function callAI(prompt) {
    const cfg = getApiConfig();
    if (!cfg.endpoint || !cfg.key) throw new Error('请先在设置中配置API');
    let apiUrl = cfg.endpoint.trim().replace(/\/+$/, '');
    if (!apiUrl.includes('/chat/completions')) {
      apiUrl += apiUrl.endsWith('/v1') ? '/chat/completions' : '/v1/chat/completions';
    }
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', apiUrl, true);
      xhr.setRequestHeader('Content-Type','application/json');
      xhr.setRequestHeader('Authorization','Bearer '+cfg.key);
      xhr.timeout = 60000;
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText).choices[0].message.content); }
          catch(e) { reject(new Error('解析响应失败')); }
        } else {
          let msg = `HTTP ${xhr.status}`;
          try { msg += ': ' + JSON.parse(xhr.responseText).error?.message; } catch(_) {}
          reject(new Error(msg));
        }
      };
      xhr.onerror = () => reject(new Error('网络连接失败'));
      xhr.ontimeout = () => reject(new Error('请求超时'));
      xhr.send(JSON.stringify({ model: cfg.model || 'gpt-3.5-turbo', messages: [{ role: 'user', content: prompt }], max_tokens: 200, temperature: 0.3 }));
    });
  }

  function parseJSONFromAI(text) {
    let m = text.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch(e) {} }
    const cleaned = text.replace(/```json|```/g, '').trim();
    m = cleaned.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch(e) {} }
    try { return JSON.parse(text.trim()); } catch(e) {}
    return null;
  }

  // ★ 检查状态（含聊天记录）
  document.getElementById('checkStatusBtn').addEventListener('click', async () => {
    const btn = document.getElementById('checkStatusBtn');
    btn.textContent = '⏳ 检查中...'; btn.disabled = true;

    try {
      const history = await loadChatHistory();
      const historyText = history.length
        ? '【最近的聊天记录】\n' + history.map(m => (m.sender === 'self' ? '伴侣' : char.name) + '：' + m.text).join('\n')
        : '';

      const wbContext = buildWorldbookContext();
      const prompt = `你是一个数据生成工具，只输出JSON，不要任何对话或解释。\n${wbContext ? wbContext + '\n' : ''}${historyText ? historyText + '\n' : ''}角色：${char.name}，人设：${char.aiPrompt || '普通'}。当前身体：体温${bodyLog.temperature}°C，${bodyLog.sick||'健康'}，${bodyLog.canWalk?'能走':'不能走'}，后穴${bodyLog.anusState||'正常'}，${bodyLog.toyEquipped?'戴着小玩具':'没戴玩具'}。\n根据聊天记录、人设和世界书，判断身体状态变化。输出JSON：{"temperature":数字,"sick":"健康"或"感冒"或"发烧"等具体描述,"canWalk":true或false,"anusState":"正常"或"轻微外翻"或"外翻"}`;

      const resp = await callAI(prompt);
      const data = parseJSONFromAI(resp);
      if (!data) throw new Error('无法解析JSON。AI返回：' + resp.substring(0, 150));

      const oldState = { ...bodyLog };
      bodyLog.temperature = parseFloat(data.temperature) || bodyLog.temperature;
      bodyLog.sick = data.sick || bodyLog.sick || '健康';
      bodyLog.canWalk = data.canWalk ?? bodyLog.canWalk;
      bodyLog.anusState = data.anusState || bodyLog.anusState;
      saveBodyLog(bodyLog);
      renderStatus();
      updateStatusDot();

      const changes = [];
      if (bodyLog.temperature !== oldState.temperature) changes.push(`体温 ${oldState.temperature}°C → ${bodyLog.temperature}°C`);
      if (bodyLog.sick !== oldState.sick) changes.push(`健康状况：${oldState.sick || '健康'} → ${bodyLog.sick}`);
      if (bodyLog.canWalk !== oldState.canWalk) changes.push(bodyLog.canWalk ? '能走路了' : '走路困难');
      if (bodyLog.anusState !== oldState.anusState) changes.push(`后穴 ${oldState.anusState} → ${bodyLog.anusState}`);
      const msg = changes.length ? '状态已更新：' + changes.join('；') : '状态已刷新，无明显变化';
      showToast(msg);

    } catch(e) {
      showToast('检查失败：' + e.message);
    } finally {
      btn.textContent = '🩺 检查状态'; btn.disabled = false;
    }
  });

  document.getElementById('toyEntryBtn').addEventListener('click', () => { window.location.href = '玩具.html?id=' + charId; });

  // 迷你聊天
  const miniChatOverlay = document.getElementById('miniChatOverlay');
  const backdrop = document.getElementById('backdrop');
  const miniChatMsgs = document.getElementById('miniChatMsgs');
  function addMiniMsg(text, type) {
    const div = document.createElement('div'); div.className = 'mini-msg ' + (type||'other'); div.textContent = text;
    miniChatMsgs.appendChild(div); miniChatMsgs.scrollTop = miniChatMsgs.scrollHeight;
  }
  async function checkCharacterReaction() {
    const cfg = getApiConfig();
    if (!cfg.endpoint || !cfg.key) { addMiniMsg('（API 未配置）', 'system'); return; }
    const history = await loadChatHistory();
    const historyText = history.length
      ? '【最近聊天】\n' + history.slice(-10).map(m => (m.sender==='self'?'伴侣':char.name)+'：'+m.text).join('\n')
      : '';
    const toyInfo = bodyLog.toyEquipped ? `戴着小玩具，震动强度${bodyLog.toyPower||0}` : '没戴玩具';
    const wbContext = buildWorldbookContext();
    const prompt = `${wbContext ? wbContext + '\n' : ''}${historyText ? historyText + '\n' : ''}你是${char.name}，人设：${char.aiPrompt||'普通'}。身体：体温${bodyLog.temperature}°C，${bodyLog.sick||'健康'}，${bodyLog.canWalk?'能走':'不能走'}，后穴${bodyLog.anusState||'正常'}，${toyInfo}。伴侣在身边。根据聊天记录、状态和人设决定是否主动说话。说话只输出内容，沉默输出[沉默]。`;
    try {
      const resp = await callAI(prompt);
      const reply = resp.trim();
      if (reply === '[沉默]') addMiniMsg('（' + char.name + '选择了沉默）', 'system');
      else addMiniMsg(reply, 'other');
    } catch(e) { addMiniMsg('（' + e.message + '）', 'system'); }
  }
  document.getElementById('avatarCircle').addEventListener('click', () => {
    miniChatMsgs.innerHTML = ''; addMiniMsg('正在感受你的存在...', 'system');
    miniChatOverlay.classList.add('show'); backdrop.classList.add('show'); checkCharacterReaction();
  });
  document.getElementById('miniChatClose').addEventListener('click', () => { miniChatOverlay.classList.remove('show'); backdrop.classList.remove('show'); });
  backdrop.addEventListener('click', () => { miniChatOverlay.classList.remove('show'); backdrop.classList.remove('show'); });

  document.getElementById('backBtn').addEventListener('click', () => { window.location.href = '主页.html'; });
})();
</script>
</body>
</html>
