<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>情侣空间</title>
<style>
/* ━━━ reset ━━━ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
a { text-decoration:none; color:inherit; }

/* ━━━ tokens ━━━ */
:root {
–bg:      #f4f3f0;
–card:    #ffffff;
–blue:    #c8d8e4;
–blue2:   rgba(200,216,228,.45);
–apr:     #f5e6d3;
–apr2:    rgba(245,230,211,.55);
–neu:     #edecea;
–ink:     #2c2c2e;
–ink2:    #636366;
–sh:      0 2px 10px rgba(44,44,46,.06);
–sh2:     0 4px 18px rgba(44,44,46,.09);
–safe-top:    env(safe-area-inset-top, 44px);
–safe-bottom: env(safe-area-inset-bottom, 20px);
}

body {
font-family: -apple-system, BlinkMacSystemFont, ‘SF Pro Text’, ‘Helvetica Neue’, sans-serif;
background: var(–bg);
width:100vw; height:100vh;
overflow:hidden;
display:flex; flex-direction:column;
color:var(–ink);
}

.ss { height:var(–safe-top); flex-shrink:0; }

/* ━━━ topbar ━━━ */
.topbar {
display:flex; align-items:center;
padding:6px 16px 6px;
flex-shrink:0;
}
.back-btn {
width:34px; height:34px; border-radius:50%;
background:rgba(255,255,255,.75); border:1px solid rgba(255,255,255,.9);
box-shadow:var(–sh); display:flex; align-items:center; justify-content:center;
font-size:18px; cursor:pointer; flex-shrink:0;
transition:transform .14s,opacity .14s;
}
.back-btn:active { transform:scale(.88); opacity:.7; }
.topbar-title {
flex:1; text-align:center; font-size:15px;
font-weight:600; letter-spacing:-.2px; margin-right:34px;
}

/* ━━━ scroll ━━━ */
.scroll {
flex:1; min-height:0;
overflow-y:auto; overflow-x:hidden;
padding:8px 16px calc(var(–safe-bottom) + 36px);
scrollbar-width:none;
}
.scroll::-webkit-scrollbar { display:none; }

/* ━━━ animations ━━━ */
@keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes rise { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ━━━━━━━━━━━━━━━━━━━━━
HERO
━━━━━━━━━━━━━━━━━━━━━ */
.hero {
background: linear-gradient(145deg, #fff 0%, rgba(200,216,228,.3) 55%, rgba(245,230,211,.3) 100%);
border-radius:26px; border:1px solid rgba(255,255,255,.9);
box-shadow:var(–sh2), inset 0 1px 0 rgba(255,255,255,.8);
padding:24px 20px 20px;
display:flex; flex-direction:column; align-items:center; gap:10px;
animation:rise .5s ease forwards;
margin-bottom:28px;
}
.hero-avs { display:flex; align-items:center; }
.hero-av {
width:54px; height:54px; border-radius:50%;
background:#fff; border:3px solid #fff;
box-shadow:0 3px 12px rgba(44,44,46,.1);
overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:21px;
animation:breathe 3.4s ease-in-out infinite;
}
.hero-av:last-child { margin-left:-14px; animation-delay:.5s; }
.hero-av img { width:100%; height:100%; object-fit:cover; }
.hero-name { font-size:19px; font-weight:700; letter-spacing:-.5px; margin-top:2px; }
.hero-stats {
display:flex; align-items:center;
background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.9);
border-radius:40px; overflow:hidden; margin-top:4px;
}
.h-stat {
display:flex; align-items:center; gap:5px;
font-size:12.5px; color:var(–ink2); cursor:pointer;
padding:9px 18px; transition:background .15s;
}
.h-stat:active { background:rgba(200,216,228,.35); }
.h-stat b { color:var(–ink); font-weight:700; font-variant-numeric:tabular-nums; }
.h-div { width:1px; height:18px; background:rgba(44,44,46,.1); }

/* ━━━━━━━━━━━━━━━━━━━━━
SECTION WRAPPER
━━━━━━━━━━━━━━━━━━━━━ */
.sec {
margin-bottom:32px;
animation:rise .5s ease forwards; opacity:0;
}
.sec-gap { height:1px; background:rgba(44,44,46,.07); margin:0 4px 32px; }

/* ━━━━━━━━━━━━━━━━━━━━━
今日陪伴 — 整块 2×2 大卡（文字 active 时出现）
━━━━━━━━━━━━━━━━━━━━━ */
.companion {
background:#fff; border-radius:24px;
border:1px solid rgba(44,44,46,.06);
box-shadow:var(–sh2); overflow:hidden;
}
.companion-hdr {
padding:14px 18px 0;
font-size:10.5px; font-weight:700; letter-spacing:.14em;
text-transform:uppercase; color:var(–ink2);
}
.cg {
display:grid; grid-template-columns:1fr 1fr;
gap:1px; background:rgba(44,44,46,.07); margin-top:12px;
}
.cc {
position:relative; background:#fff;
display:flex; flex-direction:column; align-items:center; justify-content:center;
padding:28px 12px 22px;
cursor:pointer; transition:background .16s;
overflow:hidden;
}
.cc:active { background:rgba(200,216,228,.2); }
.cc-ico {
width:60px; height:60px; border-radius:20px;
display:flex; align-items:center; justify-content:center;
font-size:28px; transition:transform .18s;
}
.cc:active .cc-ico { transform:scale(.91); }
.cc-lbl {
font-size:12px; font-weight:600; color:var(–ink);
position:absolute; bottom:12px; left:0; right:0; text-align:center;
opacity:0; transform:translateY(4px);
transition:opacity .2s,transform .2s;
}
.cc:hover .cc-lbl, .cc:active .cc-lbl { opacity:1; transform:translateY(0); }
.ai-pip {
position:absolute; top:10px; right:10px;
font-size:8.5px; font-weight:700; color:#fff;
background:rgba(159,184,202,.9);
padding:2px 6px; border-radius:7px; letter-spacing:.03em;
}

/* ━━━━━━━━━━━━━━━━━━━━━
形状按钮基础
━━━━━━━━━━━━━━━━━━━━━ */
.btn {
display:inline-flex; align-items:center; justify-content:center;
flex-direction:column; cursor:pointer; position:relative;
color:var(–ink); transition:transform .14s,opacity .14s;
flex-shrink:0;
}
.btn:active { transform:scale(.91); opacity:.82; }
.bi { line-height:1; }   /* icon span */
.bt { font-weight:600; line-height:1.2; text-align:center; } /* text span */

/* 1. 药丸 */
.pill {
flex-direction:row !important; gap:8px;
background:var(–card); border-radius:50px;
border:1px solid rgba(44,44,46,.08);
box-shadow:var(–sh); padding:12px 22px;
}
.pill .bi { font-size:20px; }
.pill .bt { font-size:13px; }

/* 2. 六边形 */
.hex {
width:80px; height:88px;
clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
gap:5px; padding-top:6px;
}
.hex .bi { font-size:24px; }
.hex .bt { font-size:11px; }

/* 3. 标签箭头 */
.tag {
flex-direction:row !important; gap:8px;
background:var(–card); border:1px solid rgba(44,44,46,.08);
box-shadow:var(–sh);
padding:11px 28px 11px 18px;
clip-path:polygon(0% 0%, 88% 0%, 100% 50%, 88% 100%, 0% 100%);
}
.tag .bi { font-size:18px; }
.tag .bt { font-size:13px; }

/* 4. 圆角方块 */
.rbox {
width:84px; height:84px;
background:var(–card); border-radius:22px;
border:1px solid rgba(44,44,46,.08);
box-shadow:var(–sh); gap:6px;
}
.rbox .bi { font-size:26px; }
.rbox .bt { font-size:11px; }

/* 5. 半圆 */
.semi {
width:88px; height:60px;
background:var(–card);
border-radius:44px 44px 0 0;
border:1px solid rgba(44,44,46,.08);
border-bottom:none;
box-shadow:0 -3px 12px rgba(44,44,46,.05);
gap:4px; padding-top:14px;
}
.semi .bi { font-size:20px; }
.semi .bt { font-size:10.5px; }

/* 6. 云/圆润长椭圆 */
.cloud {
flex-direction:row !important; gap:8px;
background:var(–card); border-radius:60px;
border:1px solid rgba(44,44,46,.06);
box-shadow:var(–sh); padding:13px 24px;
}
.cloud .bi { font-size:20px; }
.cloud .bt { font-size:13px; }

/* 7. 门票 */
.ticket {
flex-direction:row !important; gap:8px;
background:var(–card); border-radius:10px;
border:1px solid rgba(44,44,46,.08);
box-shadow:var(–sh); padding:11px 22px;
position:relative;
}
.ticket::before,.ticket::after {
content:’’; position:absolute; top:50%; transform:translateY(-50%);
width:11px; height:11px; border-radius:50%;
background:var(–bg);
}
.ticket::before { left:-5.5px; box-shadow:inset -1px 0 0 rgba(44,44,46,.1); }
.ticket::after  { right:-5.5px; box-shadow:inset 1px 0 0 rgba(44,44,46,.1); }
.ticket .bi { font-size:18px; }
.ticket .bt { font-size:13px; }

/* 8. 气泡圆 */
.bubble {
width:90px; height:90px; border-radius:50%;
background:var(–card); border:1px solid rgba(44,44,46,.08);
box-shadow:var(–sh); gap:5px;
}
.bubble .bi { font-size:26px; }
.bubble .bt { font-size:11px; }

/* 9. 文件夹标签 */
.folder {
flex-direction:row !important; gap:8px;
background:var(–card); border-radius:0 14px 14px 0;
border:1px solid rgba(44,44,46,.08); border-left:none;
box-shadow:var(–sh); padding:11px 18px 11px 14px;
}
.folder::before {
content:’’; position:absolute; left:-12px; top:0;
width:12px; height:100%; background:inherit;
border-radius:14px 0 0 14px;
box-shadow:-2px 0 5px rgba(44,44,46,.04);
}
.folder .bi { font-size:18px; }
.folder .bt { font-size:13px; }

/* 颜色修饰 */
.cb  { background:var(–blue);  }
.cb2 { background:var(–blue2); }
.ca  { background:var(–apr);   }
.ca2 { background:var(–apr2);  }
.cn  { background:var(–neu);   }

/* 横向滑动容器 */
.hscroll {
display:flex; gap:14px; align-items:center;
overflow-x:auto; overflow-y:visible;
padding: 4px 2px 10px;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}
.hscroll::-webkit-scrollbar { display:none; }
.hscroll > * { scroll-snap-align:start; }

/* 竖向排列（某些区块用 flex-wrap） */
.wrap-row {
display:flex; flex-wrap:wrap; gap:12px;
padding:2px;
}
</style>

</head>
<body>

<div class="ss"></div>

<div class="topbar">
  <div class="back-btn" id="backBtn">‹</div>
  <div class="topbar-title">情侣空间</div>
</div>

<div class="scroll">

  <!-- ═══ HERO ═══ -->

  <div class="hero">
    <div class="hero-avs" id="heroAvs">
      <div class="hero-av">💑</div>
      <div class="hero-av">❤️</div>
    </div>
    <div class="hero-name" id="heroName">还没设置情侣呢</div>
    <div class="hero-stats">
      <div class="h-stat" id="statS">
        <span>❤️ 第</span><b id="numS">--</b><span>天</span>
      </div>
      <div class="h-div"></div>
      <div class="h-stat" id="statM">
        <span>✈️ 还有</span><b id="numM">--</b>
      </div>
    </div>
  </div>

  <!-- ═══ 今日陪伴（整块 2×2 大卡） ═══ -->

  <div class="sec" style="animation-delay:.04s">
    <div class="companion">
      <div class="companion-hdr">今日陪伴</div>
      <div class="cg">
        <div class="cc" onclick="go('weather.html')">
          <div class="cc-ico cb">🌤️</div>
          <div class="cc-lbl">天气提醒</div>
        </div>
        <div class="cc" onclick="go('daily.html')">
          <div class="cc-ico ca">🎲</div>
          <div class="cc-lbl">今日话题</div>
        </div>
        <div class="cc" onclick="go('pomodoro.html')">
          <div class="cc-ico cb2">🍅</div>
          <div class="cc-lbl">番茄钟</div>
        </div>
        <div class="cc" onclick="go('goodnight.html')">
          <div class="cc-ico ca2">🌙</div>
          <div class="cc-lbl">晚安</div>
        </div>
      </div>
    </div>
  </div>

  <div class="sec-gap"></div>

  <!-- ═══ 心意与回忆（形状混搭横滑） ═══ -->

  <div class="sec" style="animation-delay:.1s">
    <div class="hscroll">

  <!-- 写信：大云形 + AI -->
  <div class="btn cloud ca" onclick="go('letter.html')" style="min-width:120px;">
    <span class="bi">✉️</span><span class="bt">写信</span>
  </div>

  <!-- 回忆墙：半圆 -->
  <div class="btn semi cb" onclick="go('memories.html')">
    <span class="bi">📸</span><span class="bt">回忆墙</span>
  </div>

  <!-- 心愿清单：标签箭头 -->
  <div class="btn tag ca2" onclick="go('wishlist.html')">
    <span class="bi">⭐</span><span class="bt">心愿清单</span>
  </div>

  <!-- 约定：药丸 -->
  <div class="btn pill cb2" onclick="go('promises.html')">
    <span class="bi">✅</span><span class="bt">我们的约定</span>
  </div>

  <!-- 日记本：带方框感的圆角方 -->
  <div class="btn rbox cn" onclick="go('diary.html')">
    <span class="bi">📔</span><span class="bt">日记本</span>
  </div>

  <!-- 备忘录：门票形 -->
  <div class="btn ticket ca" onclick="go('memo.html')">
    <span class="bi">🗒️</span><span class="bt">备忘录</span>
  </div>

</div>

  </div>

  <div class="sec-gap"></div>

  <!-- ═══ 记录与成长（混合布局） ═══ -->

  <div class="sec" style="animation-delay:.16s">
    <div class="hscroll">

  <!-- 成长时间线：大气泡 -->
  <div class="btn bubble cb" onclick="go('timeline.html')">
    <span class="bi">🧭</span><span class="bt">时间线</span>
  </div>

  <!-- 成长档案：六边形 -->
  <div class="btn hex ca" onclick="go('growth.html')">
    <span class="bi">🌱</span><span class="bt">成长档案</span>
  </div>

  <!-- 项目开发：门票 -->
  <div class="btn ticket cb2" onclick="go('devlog.html')">
    <span class="bi">🛠️</span><span class="bt">项目开发</span>
  </div>

  <!-- 梦境记录：带导轨感的标签 -->
  <div class="btn tag ca2" onclick="go('dream.html')">
    <span class="bi">💭</span><span class="bt">梦境记录</span>
  </div>

  <!-- 身体日志：半圆 -->
  <div class="btn semi cn" onclick="go('bodylog.html')">
    <span class="bi">🩹</span><span class="bt">身体日志</span>
  </div>

</div>

  </div>

  <div class="sec-gap"></div>

  <!-- ═══ 专属角落（混搭） ═══ -->

  <div class="sec" style="animation-delay:.22s">
    <div class="hscroll">

  <!-- 作品 Gallery：云形 -->
  <div class="btn cloud ca" onclick="go('gallery.html')" style="min-width:128px;">
    <span class="bi">🎨</span><span class="bt">作品 Gallery</span>
  </div>

  <!-- 语音存档：药丸 -->
  <div class="btn pill cb" onclick="go('voice.html')">
    <span class="bi">🎙️</span><span class="bt">语音存档</span>
  </div>

  <!-- 冷静区：门票 -->
  <div class="btn ticket ca2" onclick="go('cooldown.html')">
    <span class="bi">🕊️</span><span class="bt">冷静区</span>
  </div>

  <!-- Play 区：文件夹标签 -->
  <div class="btn folder cb2" onclick="go('play.html')">
    <span class="bi">🔒</span><span class="bt">Play 区</span>
  </div>

  <!-- 设置：六边形 -->
  <div class="btn hex cn" onclick="go('settings.html')">
    <span class="bi">⚙️</span><span class="bt">设置</span>
  </div>

</div>

  </div>

</div><!-- /scroll -->

<script>
(function(){
  window.go = url => window.location.href = url;

  /* ── data ── */
  const lj = k => { try{ return JSON.parse(localStorage.getItem(k))||null; }catch(e){ return null; } };
  const couple = () => lj('couple_data');
  const chars  = () => lj('chat_characters')||[];
  const user   = () => lj('user_data')||{};
  const av = (t,id) => t==='user' ? user().avatar||'' : (chars().find(c=>c.id==id)||{}).avatar||'';
  const nm = (t,id) => t==='user' ? user().name||'我'  : (chars().find(c=>c.id==id)||{}).name||'角色';

  /* ── hero ── */
  function renderHero(){
    const d=couple();
    const aEl=document.getElementById('heroAvs');
    const nEl=document.getElementById('heroName');
    if(d?.person1&&d?.person2){
      const a1=av(d.person1.type,d.person1.id), a2=av(d.person2.type,d.person2.id);
      aEl.innerHTML=`<div class="hero-av">${a1?`<img src="${a1}">`:'💑'}</div>`
                   +`<div class="hero-av">${a2?`<img src="${a2}">`:'❤️'}</div>`;
      nEl.textContent=nm(d.person1.type,d.person1.id)+' & '+nm(d.person2.type,d.person2.id);
    }
  }
  renderHero();

  /* ── dates ── */
  function sfx(){
    const d=couple();
    if(!d?.person1||!d?.person2) return 'def';
    return [d.person1.type+d.person1.id,d.person2.type+d.person2.id].sort().join('_');
  }
  const ks=()=>'cs_start_'+sfx(), km=()=>'cs_meet_'+sfx();

  function renderS(){
    const v=localStorage.getItem(ks());
    const el=document.getElementById('numS');
    if(v){ const d=Math.floor((Date.now()-new Date(v).getTime())/86400000)+1; el.textContent=d>0?d:1; }
    else el.textContent='?';
  }
  function renderM(){
    const v=localStorage.getItem(km());
    const el=document.getElementById('numM');
    if(v){
      const d=Math.ceil((new Date(v).setHours(0,0,0,0)-new Date().setHours(0,0,0,0))/86400000);
      el.textContent=d>0?d+'天':(d===0?'今天 👀':'已过');
    } else el.textContent='--';
  }
  renderS(); renderM();

  document.getElementById('statS').onclick=()=>{
    const v=prompt('在一起的开始日期（YYYY-MM-DD）：',localStorage.getItem(ks())||'');
    if(v===null)return;
    v.trim()===''?localStorage.removeItem(ks()):localStorage.setItem(ks(),v.trim());
    renderS();
  };
  document.getElementById('statM').onclick=()=>{
    const v=prompt('下一次见面的日期（YYYY-MM-DD）：',localStorage.getItem(km())||'');
    if(v===null)return;
    v.trim()===''?localStorage.removeItem(km()):localStorage.setItem(km(),v.trim());
    renderM();
  };

  /* ── back ── */
  document.getElementById('backBtn').onclick=()=>{
    window.history.length>1?window.history.back():window.location.href='../main.html';
  };
})();
</script>

</body>
</html>
