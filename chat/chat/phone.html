<!DOCTYPE html>

<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <!-- 让页面真正按设备宽度渲染，并允许铺到刘海/底部安全区 -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iPhone 添加到主屏幕后作为独立网页 App 打开 -->

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FiN">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">

  <title>聊天列表 · 简约圆角</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1d1d1f;
    }

    .app-container {
      width: 100%;
      min-height: 100dvh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;

      /* iPhone 安全区 */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .header {
      padding: 14px 20px 10px 20px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 20px;
      font-weight: 620;
      color: #1d1d1f;
      letter-spacing: -0.3px;
    }

    .add-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #1d1d1f;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
      font-weight: 300;
      line-height: 1;
    }

    .add-btn:active {
      background: #f2f2f2;
    }

    .search-wrap {
      padding: 10px 20px 8px 20px;
      flex-shrink: 0;
      background: #ffffff;
    }

    .search-box {
      background: #f2f2f6;
      border-radius: 20px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #8e8e93;
      font-size: 14px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      width: 100%;
      color: #1c1c1e;
      appearance: none;
      -webkit-appearance: none;
    }

    .search-box input::placeholder {
      color: #8e8e93;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 16px 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #ffffff;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid #f0f0f0;
      transition: background 0.15s;
      cursor: pointer;
      gap: 12px;
    }

    .chat-item:active {
      background: #f5f5f5;
    }

    .avatar-wrapper {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      background: #e9e9ef;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      background: #d9d9e3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8e8e93;
      font-size: 16px;
    }

    .chat-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .chat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      gap: 10px;
    }

    .chat-name {
      font-weight: 600;
      font-size: 15px;
      color: #1d1d1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .chat-time {
      font-size: 12px;
      color: #8e8e93;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chat-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .chat-message {
      font-size: 13px;
      color: #6c6c70;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .unread-badge {
      background: #1d1d1f;
      color: white;
      border-radius: 12px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    /* 底栏导航 */
    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 12px 14px 12px;
      background: #ffffff;
      border-top: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #8e8e93;
      cursor: pointer;
      transition: color 0.15s;
      background: none;
      border: none;
      padding: 6px 12px;
      border-radius: 16px;
      font-weight: 500;
      text-decoration: none;
      min-width: 60px;
    }

    .nav-item.active {
      color: #1d1d1f;
      font-weight: 600;
    }

    .nav-item span {
      font-size: 18px;
      line-height: 1;
    }

    .nav-item:active {
      background: #f4f4f4;
    }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s ease;
      padding:
        calc(env(safe-area-inset-top) + 16px)
        16px
        calc(env(safe-area-inset-bottom) + 16px)
        16px;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-card {
      background: white;
      border-radius: 28px;
      padding: 24px 20px;
      width: min(300px, 100%);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-card h3 {
      font-size: 18px;
      font-weight: 620;
      color: #1d1d1f;
      text-align: center;
    }

    .modal-card input {
      border: 1px solid #e5e5ea;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      width: 100%;
    }

    .avatar-upload-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar-preview {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: #f2f2f6;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .upload-btn {
      background: #f2f2f6;
      border: none;
      border-radius: 14px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .upload-btn:active {
      background: #e9e9ef;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-cancel {
      background: #f2f2f6;
      color: #1d1d1f;
    }

    .btn-confirm {
      background: #1d1d1f;
      color: white;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .hidden-file-input {
      display: none;
    }
  </style>

</head>
<body>
  <div class="app-container">
    <div class="header">
      <div class="header-title">聊天</div>
      <button class="add-btn" id="openCreateModalBtn" aria-label="新建角色">+</button>
    </div>

<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="search" placeholder="搜索" id="searchInput">
  </div>
</div>

<div class="chat-list" id="chatListContainer"></div>

<div class="bottom-nav">
  <button class="nav-item active" data-page="chat">
    <span>💬</span>
    聊天
  </button>
  <button class="nav-item" data-page="name">
    <span>👥</span>
    通讯录
  </button>
  <button class="nav-item" data-page="search">
    <span>🧭</span>
    发现
  </button>
  <button class="nav-item" data-page="my">
    <span>👤</span>
    我
  </button>
</div>

  </div>

  <div class="modal-overlay" id="createModal">
    <div class="modal-card">
      <h3>新建角色</h3>
      <input type="text" placeholder="角色名称" id="newCharName" autocomplete="off">
      <div class="avatar-upload-area">
        <div class="avatar-preview" id="avatarPreview">
          <div class="avatar-placeholder" id="placeholderIcon">📷</div>
          <img id="previewImg" src="" alt="预览" style="display: none;">
        </div>
        <button class="upload-btn" id="triggerFileInput">选择头像</button>
        <input type="file" accept="image/*" id="fileInput" class="hidden-file-input">
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="cancelCreateBtn">取消</button>
        <button class="btn btn-confirm" id="confirmCreateBtn">创建</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      let characters = [];

      function loadCharacters() {
        try {
          const stored = localStorage.getItem('chat_characters');
          if (stored) {
            characters = JSON.parse(stored);
          } else {
            characters = [];
          }
        } catch (e) {
          characters = [];
        }
      }

      function saveCharacters() {
        localStorage.setItem('chat_characters', JSON.stringify(characters));
      }

      const chatContainer = document.getElementById('chatListContainer');

      function renderChatList() {
        if (!chatContainer) return;

        if (characters.length === 0) {
          chatContainer.innerHTML = `
            <div style="padding: 40px 20px; text-align: center; color: #8e8e93; font-size: 14px;">
              暂无聊天角色，点击右上角 + 创建
            </div>
          `;
          return;
        }

        let html = '';

        characters.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

        characters.forEach(char => {
          const safeMsg = char.lastMessage && char.lastMessage.length > 20
            ? char.lastMessage.substring(0, 20) + '…'
            : (char.lastMessage || '开始新对话');

          const avatarContent = char.avatar
            ? `<img src="${char.avatar}" alt="头像">`
            : `<div class="avatar-placeholder">📷</div>`;

          html += `
            <div class="chat-item" data-id="${char.id}">
              <div class="avatar-wrapper">
                ${avatarContent}
              </div>
              <div class="chat-info">
                <div class="chat-top">
                  <span class="chat-name">${escapeHtml(char.name)}</span>
                  <span class="chat-time">${char.time || ''}</span>
                </div>
                <div class="chat-bottom">
                  <span class="chat-message">${escapeHtml(safeMsg)}</span>
                  ${char.unread > 0 ? `<span class="unread-badge">${char.unread}</span>` : ''}
                </div>
              </div>
            </div>
          `;
        });

        chatContainer.innerHTML = html;

        // 点击角色跳转到 chat.html
        document.querySelectorAll('.chat-item').forEach(item => {
          item.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            window.location.href = `chat.html?id=${id}`;
          });
        });
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // 底栏导航跳转逻辑
      const navItems = document.querySelectorAll('.bottom-nav .nav-item');

      const pageRoutes = {
        chat: 'phone.html',
        name: '../friends/friends.html',
        search: '../search/search.html',
        my: '../my/my.html'
      };

      navItems.forEach(item => {
        item.addEventListener('click', function() {
          const page = this.getAttribute('data-page');

          navItems.forEach(n => n.classList.remove('active'));
          this.classList.add('active');

          if (page === 'chat') return;

          const targetUrl = pageRoutes[page];
          if (targetUrl) {
            window.location.href = targetUrl;
          }
        });
      });

      // 创建角色弹窗逻辑
      const modal = document.getElementById('createModal');
      const openBtn = document.getElementById('openCreateModalBtn');
      const cancelBtn = document.getElementById('cancelCreateBtn');
      const confirmBtn = document.getElementById('confirmCreateBtn');
      const nameInput = document.getElementById('newCharName');
      const fileInput = document.getElementById('fileInput');
      const triggerFileBtn = document.getElementById('triggerFileInput');
      const previewImg = document.getElementById('previewImg');
      const placeholderIcon = document.getElementById('placeholderIcon');

      let selectedAvatarData = '';

      function openModal() {
        nameInput.value = '';
        selectedAvatarData = '';
        previewImg.style.display = 'none';
        placeholderIcon.style.display = 'flex';
        previewImg.src = '';
        modal.classList.add('active');
        nameInput.focus();
      }

      function closeModal() {
        modal.classList.remove('active');
      }

      openBtn.addEventListener('click', openModal);
      cancelBtn.addEventListener('click', closeModal);

      modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
      });

      triggerFileBtn.addEventListener('click', () => {
        fileInput.click();
      });

      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(ev) {
          selectedAvatarData = ev.target.result;
          previewImg.src = selectedAvatarData;
          previewImg.style.display = 'block';
          placeholderIcon.style.display = 'none';
        };
        reader.readAsDataURL(file);
      });

      confirmBtn.addEventListener('click', function() {
        const name = nameInput.value.trim();
        if (!name) {
          alert('请输入角色名称');
          return;
        }

        const newChar = {
          id: Date.now(),
          name: name,
          avatar: selectedAvatarData || '',
          lastMessage: '点击开始对话',
          time: '现在',
          unread: 0,
          signature: '',
          aiPrompt: '',
          apiEndpoint: '',
          apiKey: '',
          model: ''
        };

        characters.unshift(newChar);
        saveCharacters();
        renderChatList();
        closeModal();

        fileInput.value = '';
        selectedAvatarData = '';

        // 创建后自动跳转到 chat.html
        window.location.href = `chat.html?id=${newChar.id}`;
      });

      // 搜索功能
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase().trim();
        const items = document.querySelectorAll('.chat-item');

        items.forEach(item => {
          const nameEl = item.querySelector('.chat-name');
          const msgEl = item.querySelector('.chat-message');
          const nameText = nameEl?.textContent.toLowerCase() || '';
          const msgText = msgEl?.textContent.toLowerCase() || '';

          if (nameText.includes(query) || msgText.includes(query)) {
            item.style.display = 'flex';
          } else {
            item.style.display = 'none';
          }
        });
      });

      // 初始化
      loadCharacters();
      renderChatList();
    })();
  </script>

</body>
</html>
