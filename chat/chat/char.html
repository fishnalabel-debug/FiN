<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>角色设置 · 小手机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 850px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #ffffff;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
      gap: 10px;
      padding-top: max(10px, env(safe-area-inset-top));
      min-height: max(44px, calc(44px + env(safe-area-inset-top)));
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #1d1d1f;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: #f2f2f2;
    }

    .header-title {
      font-size: 17px;
      font-weight: 620;
      color: #1d1d1f;
      flex: 1;
      text-align: center;
    }

    .save-btn {
      background: #1d1d1f;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .save-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .save-btn:hover:not(:disabled) {
      background: #2c2c2e;
    }

    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .section {
      background: #ffffff;
      border: 1px solid #f0f0f0;
      border-radius: 20px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .avatar-upload-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar-large {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      overflow: hidden;
      background: #f2f2f6;
      flex-shrink: 0;
    }

    .avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8e8e93;
      font-size: 24px;
    }

    .upload-hint {
      font-size: 13px;
      color: #8e8e93;
      cursor: pointer;
      background: #f2f2f6;
      padding: 8px 14px;
      border-radius: 14px;
    }

    .input-field {
      border: 1px solid #e5e5ea;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      width: 100%;
      background: #f9f9fb;
      font-family: inherit;
    }

    textarea.input-field {
      resize: vertical;
      min-height: 70px;
      max-height: none;
      overflow-y: visible;
    }

    .voice-test-btn {
      background: #f2f2f6;
      border: none;
      border-radius: 14px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      align-self: flex-start;
    }

    .preset-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .preset-select {
      flex: 1;
      border: 1px solid #e5e5ea;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      background: #f9f9fb;
      outline: none;
    }

    .new-preset-btn {
      background: #f2f2f6;
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .fetch-models-btn {
      background: #f2f2f6;
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      align-self: flex-start;
    }

    .model-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      max-height: 150px;
      overflow-y: auto;
    }

    .model-chip {
      background: #f2f2f6;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }

    .model-chip.selected {
      background: #1d1d1f;
      color: white;
      border-color: #1d1d1f;
    }

    .model-manual-hint {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 4px;
    }

    .hidden-file-input {
      display: none;
    }

    .context-info {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 4px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .input-field {
      flex: 1;
    }

    .field-hint {
      font-size: 11px;
      color: #8e8e93;
      margin-top: -4px;
      margin-bottom: 4px;
      padding-left: 4px;
    }

    /* Toast 提示 */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1d1d1f;
      color: white;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .toast.show {
      opacity: 1;
    }
    .toast.error {
      background: #d32f2f;
    }
    .toast.success {
      background: #2e7d32;
    }
  </style>
</head>
<body>
  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <div class="app-container">
    <div class="header">
      <button class="back-btn" id="backBtn">←</button>
      <div class="header-title">角色设置</div>
      <button class="save-btn" id="saveSettingsBtn">保存</button>
    </div>

    <div class="settings-content">
      <!-- 角色信息 -->
      <div class="section">
        <div class="section-title">角色信息</div>
        <div class="avatar-upload-row">
          <div class="avatar-large" id="avatarPreviewLarge">
            <div class="avatar-placeholder" id="avatarPlaceholderLarge">📷</div>
            <img id="avatarImgLarge" src="" alt="头像" style="display: none;">
          </div>
          <span class="upload-hint" id="uploadAvatarBtn">点击更换头像</span>
          <input type="file" accept="image/*" id="avatarFileInput" class="hidden-file-input">
        </div>
        <div class="row">
          <input type="text" class="input-field" id="charNameInput" placeholder="角色备注名（你给 AI 的称呼）">
          <input type="text" class="input-field" id="charRealNameInput" placeholder="真名（可选）">
        </div>
        <div class="field-hint">💡 “角色备注名”是你给 AI 的称呼，AI 会知道这是你为它设置的备注。</div>
        <textarea class="input-field" id="charSignatureInput" placeholder="个性签名（将显示在聊天界面）" style="min-height:60px;"></textarea>
        <textarea class="input-field" id="charPromptInput" placeholder="角色设定 / AI 系统提示词 (无字数限制)" style="min-height:100px;"></textarea>
      </div>

      <!-- 语音设置 -->
      <div class="section">
        <div class="section-title">角色语音 · ElevenLabs</div>
        <input type="text" class="input-field" id="voiceApiKeyInput" placeholder="ElevenLabs API Key">
        <input type="text" class="input-field" id="voiceIdInput" placeholder="语音ID (Voice ID)">
        <button class="voice-test-btn" id="testVoiceBtn">试听语音</button>
      </div>

      <!-- API 设置 -->
      <div class="section">
        <div class="section-title">API 设置</div>
        <div class="preset-row">
          <select class="preset-select" id="presetSelect">
            <option value="">-- 选择已保存的API预设 --</option>
          </select>
          <button class="new-preset-btn" id="newPresetBtn">+ 新建预设</button>
        </div>
        <input type="text" class="input-field" id="apiEndpointInput" placeholder="API地址 (例如 https://api.openai.com/v1/chat/completions)">
        <input type="text" class="input-field" id="apiKeyInput" placeholder="API Key">
        <button class="fetch-models-btn" id="fetchModelsBtn">🔄 自动拉取模型列表</button>
        <div class="model-list" id="modelListContainer"></div>
        <input type="text" class="input-field" id="selectedModelInput" placeholder="或手动输入模型名称（如 gpt-3.5-turbo）">
        <div class="model-manual-hint">💡 如自动拉取失败，请直接手动输入模型名称</div>
        <div class="context-info">💬 AI默认记忆上下文：100轮对话</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- Toast 提示函数 -----
      function showToast(message, type = 'info', duration = 3000) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast';
        if (type === 'error') toast.classList.add('error');
        if (type === 'success') toast.classList.add('success');
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
      }

      const params = new URLSearchParams(window.location.search);
      const charId = params.get('id');

      if (!charId) {
        showToast('❌ 缺少角色ID，请从角色列表进入', 'error', 4000);
        setTimeout(() => window.location.href = 'phone.html', 2000);
        return;
      }

      function getCharacters() {
        try {
          return JSON.parse(localStorage.getItem('chat_characters') || '[]');
        } catch (e) {
          return [];
        }
      }

      function saveCharacters(chars) {
        try {
          localStorage.setItem('chat_characters', JSON.stringify(chars));
          return true;
        } catch (e) {
          if (e.name === 'QuotaExceededError' || e.code === 22) {
            showToast('❌ 存储空间不足！请清理头像或删除旧角色', 'error', 5000);
          } else {
            showToast('❌ 保存失败: ' + e.message, 'error', 4000);
          }
          return false;
        }
      }

      function getCurrentChar() {
        return getCharacters().find(c => c.id == charId);
      }

      const avatarFileInput = document.getElementById('avatarFileInput');
      const avatarImgLarge = document.getElementById('avatarImgLarge');
      const avatarPlaceholderLarge = document.getElementById('avatarPlaceholderLarge');
      const charNameInput = document.getElementById('charNameInput');
      const charRealNameInput = document.getElementById('charRealNameInput');
      const charSignatureInput = document.getElementById('charSignatureInput');
      const charPromptInput = document.getElementById('charPromptInput');
      const voiceApiKeyInput = document.getElementById('voiceApiKeyInput');
      const voiceIdInput = document.getElementById('voiceIdInput');
      const apiEndpointInput = document.getElementById('apiEndpointInput');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const selectedModelInput = document.getElementById('selectedModelInput');
      const modelListContainer = document.getElementById('modelListContainer');
      const presetSelect = document.getElementById('presetSelect');
      const saveBtn = document.getElementById('saveSettingsBtn');

      let currentAvatarData = '';

      function loadCharData() {
        const char = getCurrentChar();
        if (!char) {
          showToast('❌ 角色未找到，请返回重试', 'error', 3000);
          setTimeout(() => window.location.href = 'phone.html', 1500);
          return;
        }
        charNameInput.value = char.name || '';
        charRealNameInput.value = char.realName || '';
        charSignatureInput.value = char.signature || '';
        charPromptInput.value = char.aiPrompt || '';
        voiceApiKeyInput.value = char.voiceApiKey || '';
        voiceIdInput.value = char.voiceId || '';
        apiEndpointInput.value = char.apiEndpoint || '';
        apiKeyInput.value = char.apiKey || '';
        selectedModelInput.value = char.model || '';
        currentAvatarData = char.avatar || '';

        if (char.avatar) {
          avatarImgLarge.src = char.avatar;
          avatarImgLarge.style.display = 'block';
          avatarPlaceholderLarge.style.display = 'none';
        } else {
          avatarImgLarge.style.display = 'none';
          avatarPlaceholderLarge.style.display = 'flex';
        }
        loadPresets();
        showToast('✅ 已加载角色: ' + (char.name || '未命名'), 'success', 1500);
      }

      document.getElementById('uploadAvatarBtn').addEventListener('click', () => avatarFileInput.click());
      avatarFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // 检查文件大小，避免撑爆 localStorage
        if (file.size > 500 * 1024) {
          showToast('⚠️ 头像建议小于500KB，当前文件较大可能影响保存', 'error', 3000);
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          currentAvatarData = ev.target.result;
          avatarImgLarge.src = currentAvatarData;
          avatarImgLarge.style.display = 'block';
          avatarPlaceholderLarge.style.display = 'none';
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('testVoiceBtn').addEventListener('click', async () => {
        const apiKey = voiceApiKeyInput.value.trim();
        const voiceId = voiceIdInput.value.trim();
        if (!apiKey || !voiceId) {
          showToast('⚠️ 请输入ElevenLabs API Key和语音ID', 'error', 2000);
          return;
        }
        try {
          const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
            method: 'POST',
            headers: { 'xi-api-key': apiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              text: '你好，这是语音测试。',
              model_id: 'eleven_monolingual_v1',
              voice_settings: { stability: 0.5, similarity_boost: 0.5 }
            })
          });
          if (!response.ok) throw new Error('请求失败');
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          new Audio(url).play();
          showToast('🔊 正在播放测试语音', 'success', 1500);
        } catch (err) {
          showToast('❌ 语音合成失败: ' + err.message, 'error', 3000);
        }
      });

      document.getElementById('fetchModelsBtn').addEventListener('click', async () => {
        const endpoint = apiEndpointInput.value.trim();
        const apiKey = apiKeyInput.value.trim();
        if (!endpoint || !apiKey) { showToast('⚠️ 请先填写API地址和Key', 'error', 2000); return; }

        const btn = document.getElementById('fetchModelsBtn');
        const originalText = btn.textContent;
        btn.textContent = '⏳ 正在拉取...';
        btn.disabled = true;

        try {
          let modelsUrl = '';
          if (endpoint.includes('api.openai.com')) {
            modelsUrl = 'https://api.openai.com/v1/models';
          } else if (endpoint.includes('/chat/completions')) {
            modelsUrl = endpoint.replace(/\/chat\/completions\/?$/, '/models');
          } else if (endpoint.includes('/v1/')) {
            modelsUrl = endpoint.replace(/\/v1\/.*$/, '/v1/models');
          } else {
            modelsUrl = endpoint.replace(/\/+$/, '') + '/models';
          }

          const res = await fetch(modelsUrl, {
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' }
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          let models = [];
          if (data.data && Array.isArray(data.data)) {
            models = data.data.map(m => m.id);
          } else if (data.models && Array.isArray(data.models)) {
            models = data.models.map(m => m.id || m.name);
          } else if (Array.isArray(data)) {
            models = data.map(m => m.id || m.name || m);
          }
          if (models.length === 0) throw new Error('未找到可用模型');
          renderModelChips(models);
          showToast(`✅ 成功拉取 ${models.length} 个模型`, 'success', 2000);
        } catch (err) {
          showToast(`❌ 自动拉取失败: ${err.message}\n请手动输入模型名称`, 'error', 4000);
        } finally {
          btn.textContent = originalText;
          btn.disabled = false;
        }
      });

      function renderModelChips(models) {
        modelListContainer.innerHTML = '';
        const currentModel = selectedModelInput.value.trim();
        models.forEach(modelId => {
          const chip = document.createElement('span');
          chip.className = 'model-chip';
          chip.textContent = modelId;
          chip.addEventListener('click', () => {
            document.querySelectorAll('.model-chip').forEach(c => c.classList.remove('selected'));
            chip.classList.add('selected');
            selectedModelInput.value = modelId;
          });
          if (currentModel === modelId) chip.classList.add('selected');
          modelListContainer.appendChild(chip);
        });
      }

      selectedModelInput.addEventListener('input', () => {
        const manualModel = selectedModelInput.value.trim();
        document.querySelectorAll('.model-chip').forEach(chip => {
          chip.classList.toggle('selected', chip.textContent === manualModel);
        });
      });

      function loadPresets() {
        try {
          const presets = JSON.parse(localStorage.getItem('api_presets') || '[]');
          presetSelect.innerHTML = '<option value="">-- 选择已保存的API预设 --</option>';
          presets.forEach((p, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = p.name || `预设 ${idx+1}`;
            presetSelect.appendChild(opt);
          });
        } catch (e) {
          // ignore
        }
      }

      presetSelect.addEventListener('change', () => {
        const idx = presetSelect.value;
        if (idx === '') return;
        try {
          const presets = JSON.parse(localStorage.getItem('api_presets') || '[]');
          const preset = presets[idx];
          if (preset) {
            apiEndpointInput.value = preset.endpoint || '';
            apiKeyInput.value = preset.apiKey || '';
            selectedModelInput.value = preset.model || '';
            showToast('✅ 已加载预设: ' + preset.name, 'success', 1500);
          }
        } catch (e) { /* ignore */ }
      });

      document.getElementById('newPresetBtn').addEventListener('click', () => {
        const name = prompt('输入预设名称');
        if (!name) return;
        try {
          const presets = JSON.parse(localStorage.getItem('api_presets') || '[]');
          presets.push({
            name: name,
            endpoint: apiEndpointInput.value.trim(),
            apiKey: apiKeyInput.value.trim(),
            model: selectedModelInput.value.trim()
          });
          localStorage.setItem('api_presets', JSON.stringify(presets));
          loadPresets();
          showToast('✅ 预设已保存', 'success', 1500);
        } catch (e) {
          showToast('❌ 保存预设失败: ' + e.message, 'error', 2000);
        }
      });

      // ★★★ 核心保存逻辑 - 增强版 ★★★
      document.getElementById('saveSettingsBtn').addEventListener('click', function() {
        // 防止重复点击
        if (this.disabled) return;
        this.disabled = true;
        this.textContent = '⏳ 保存中...';

        try {
          // 1. 检查角色是否存在
          const chars = getCharacters();
          const index = chars.findIndex(c => c.id == charId);
          if (index === -1) {
            showToast('❌ 角色不存在，请重新打开', 'error', 3000);
            this.disabled = false;
            this.textContent = '保存';
            return;
          }

          // 2. 收集数据
          const name = charNameInput.value.trim() || '未命名';
          const realName = charRealNameInput.value.trim();
          const signature = charSignatureInput.value.trim();
          const aiPrompt = charPromptInput.value.trim();
          const voiceApiKey = voiceApiKeyInput.value.trim();
          const voiceId = voiceIdInput.value.trim();
          const apiEndpoint = apiEndpointInput.value.trim();
          const apiKey = apiKeyInput.value.trim();
          const model = selectedModelInput.value.trim();

          // 3. 计算数据大小，预警
          const totalSize = new Blob([JSON.stringify({
            name, realName, signature, aiPrompt, voiceApiKey, voiceId,
            apiEndpoint, apiKey, model, avatar: currentAvatarData
          })]).size;
          if (totalSize > 4 * 1024 * 1024) {
            showToast('⚠️ 数据量较大(' + (totalSize/1024/1024).toFixed(1) + 'MB)，可能超出存储限制', 'error', 4000);
            // 仍然继续尝试保存
          }

          // 4. 更新数据
          chars[index].name = name;
          chars[index].realName = realName;
          chars[index].avatar = currentAvatarData;
          chars[index].signature = signature;
          chars[index].aiPrompt = aiPrompt;
          chars[index].voiceApiKey = voiceApiKey;
          chars[index].voiceId = voiceId;
          chars[index].apiEndpoint = apiEndpoint;
          chars[index].apiKey = apiKey;
          chars[index].model = model;
          chars[index].contextLength = 100;

          // 5. 保存到 localStorage
          const saved = saveCharacters(chars);
          
          if (saved) {
            showToast('✅ 设置已保存成功！', 'success', 2000);
            // 延迟跳转，让用户看到成功提示
            setTimeout(() => {
              window.location.href = `chat.html?id=${charId}`;
            }, 800);
          } else {
            // saveCharacters 内部已经 showToast 了
            this.disabled = false;
            this.textContent = '保存';
          }
        } catch (err) {
          showToast('❌ 保存异常: ' + err.message, 'error', 4000);
          this.disabled = false;
          this.textContent = '保存';
          console.error('保存错误:', err);
        }
      });

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = `more.html?id=${charId}`;
      });

      // 加载数据
      loadCharData();
    })();
  </script>
</body>
</html>
