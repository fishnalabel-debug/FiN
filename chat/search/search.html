<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>发现 · 小手机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 0;
    }

    .app-container {
      width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
      background: #ffffff; display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,0.05); overflow: hidden; position: relative;
    }

    .header {
      padding: 14px 20px 10px 20px; background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
    }
    .header-title { font-size: 20px; font-weight: 620; color: #1d1d1f; letter-spacing: -0.3px; }

    .content {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .feature-card {
      background: #ffffff; border: 1px solid #f0f0f0; border-radius: 20px;
      padding: 16px 18px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: background 0.1s;
    }
    .feature-card:hover { background: #fafafa; }
    .feature-card:active { background: #f5f5f5; }
    .feature-label { font-size: 16px; font-weight: 500; color: #1d1d1f; }
    .feature-arrow { font-size: 18px; color: #c7c7cc; font-weight: 300; }

    .bottom-nav {
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 12px 14px 12px; background: #ffffff;
      border-top: 1px solid #f0f0f0; flex-shrink: 0;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 12px; color: #8e8e93; cursor: pointer; transition: color 0.15s;
      background: none; border: none; padding: 6px 12px; border-radius: 16px; font-weight: 500;
    }
    .nav-item.active { color: #1d1d1f; font-weight: 600; }
    .nav-item span { font-size: 18px; line-height: 1; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <div class="header-title">发现</div>
    </div>

    <div class="content">
      <div class="feature-card" id="momentsCard">
        <span class="feature-label">朋友圈</span>
        <span class="feature-arrow">›</span>
      </div>
      <div class="feature-card" id="worldbookCard">
        <span class="feature-label">世界书</span>
        <span class="feature-arrow">›</span>
      </div>

      <div class="feature-card" id="meetCard">
        <span class="feature-label">见面</span>
        <span class="feature-arrow">›</span>
      </div>
    </div>

    <!-- ★ 底栏：5个，去掉 ../ -->
    <div class="bottom-nav">
      <button class="nav-item" data-page="chat">
        <span>💬</span>聊天
      </button>
      <button class="nav-item" data-page="name">
        <span>👥</span>通讯录
      </button>
      <button class="nav-item active" data-page="search">
        <span>🧭</span>发现
      </button>
      <button class="nav-item" data-page="my">
        <span>👤</span>我
      </button>
    </div>
  </div>

  <script>
    (function() {
      // ★ 路径修正：search.html在根目录，其他也在根目录
      const pageRoutes = {
    'chat': '../chat/phone.html',
    'name': '../friends/friends.html',
    'search': 'search.html',
    'my': '../my/my.html'
};

      document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
        item.addEventListener('click', function() {
          const page = this.getAttribute('data-page');
          if (page === 'search') return;
          const targetUrl = pageRoutes[page];
          if (targetUrl) {
            window.location.href = targetUrl;
          }
        });
      });

      document.getElementById('momentsCard').addEventListener('click', () => {
    window.location.href = '朋友圈.html';
});

document.getElementById('worldbookCard').addEventListener('click', () => {
    window.location.href = 'world.html';
});

document.getElementById('meetCard').addEventListener('click', () => {
    window.location.href = 'meet.html';
});
})();
  </script>
</body>
</html>
