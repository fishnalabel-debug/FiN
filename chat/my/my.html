<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>我 · 小手机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 850px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 14px 20px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 20px;
      font-weight: 620;
      color: #1d1d1f;
      letter-spacing: -0.3px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .namecard {
      background: #ffffff;
      border: 1px solid #f0f0f0;
      border-radius: 24px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .namecard-avatar {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      overflow: hidden;
      background: #f2f2f6;
      flex-shrink: 0;
      cursor: pointer;
    }

    .namecard-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8e8e93;
      font-size: 24px;
    }

    .namecard-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .namecard-name {
      font-size: 18px;
      font-weight: 620;
      color: #1d1d1f;
    }

    .namecard-id {
      font-size: 12px;
      color: #8e8e93;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .namecard-signature {
      font-size: 13px;
      color: #6c6c70;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px;
      background: #ffffff;
      border: 1px solid #f0f0f0;
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.1s;
      min-height: 52px;
      flex-shrink: 0;
    }

    .list-item:hover {
      background: #fafafa;
    }

    .list-item:active {
      background: #f5f5f5;
    }

    .list-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .list-label {
      font-size: 15px;
      font-weight: 500;
      color: #1d1d1f;
    }

    .list-hint {
      font-size: 12px;
      color: #8e8e93;
    }

    .list-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .list-value {
      font-size: 13px;
      color: #8e8e93;
    }

    .list-arrow {
      font-size: 16px;
      color: #c7c7cc;
    }

    .hidden-file-input {
      display: none;
    }

    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px 12px 14px 12px;
      background: #ffffff;
      border-top: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #8e8e93;
      cursor: pointer;
      transition: color 0.15s;
      background: none;
      border: none;
      padding: 6px 12px;
      border-radius: 16px;
      font-weight: 500;
    }

    .nav-item.active {
      color: #1d1d1f;
      font-weight: 600;
    }

    .nav-item span {
      font-size: 18px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <div class="header-title">我</div>
    </div>

    <div class="content">
      <!-- 名片 -->
      <div class="namecard">
        <div class="namecard-avatar" id="namecardAvatar">
          <div class="avatar-placeholder" id="avatarPlaceholder">📷</div>
          <img id="namecardImg" src="" alt="头像" style="display: none;">
        </div>
        <div class="namecard-info">
          <div class="namecard-name" id="namecardName">未设置</div>
          <div class="namecard-id" id="namecardId">ID: --------</div>
          <div class="namecard-signature" id="namecardSignature">nothing…</div>
        </div>
        <input type="file" accept="image/*" id="avatarFileInput" class="hidden-file-input">
      </div>

      <!-- 设定 → user.html -->
      <div class="list-item" id="settingsItem">
        <div class="list-left">
          <span class="list-label">设定</span>
          <span class="list-hint">编辑API、姓名、ID、签名、性别、地区</span>
        </div>
        <span class="list-arrow">›</span>
      </div>

      <!-- 性别（只读显示） -->
      <div class="list-item">
        <div class="list-left">
          <span class="list-label">性别</span>
        </div>
        <div class="list-right">
          <span class="list-value" id="genderValue">未设置</span>
          <span class="list-arrow">›</span>
        </div>
      </div>

      <!-- 地区（只读显示） -->
      <div class="list-item">
        <div class="list-left">
          <span class="list-label">地区</span>
        </div>
        <div class="list-right">
          <span class="list-value" id="regionValue">未设置</span>
          <span class="list-arrow">›</span>
        </div>
      </div>

      <!-- 资金 → my/money.html -->
      <div class="list-item" id="moneyItem">
        <div class="list-left">
          <span class="list-label">资金</span>
        </div>
        <div class="list-right">
          <span class="list-value">0.00</span>
          <span class="list-arrow">›</span>
        </div>
      </div>

      <!-- 收藏 → my/collect.html -->
      <div class="list-item" id="collectItem">
        <span class="list-label">收藏</span>
        <span class="list-arrow">›</span>
      </div>

      <!-- 拍一拍 → my/tap.html -->
      <div class="list-item" id="tapItem">
        <span class="list-label">拍一拍</span>
        <span class="list-arrow">›</span>
      </div>

      <!-- 来电铃声 → my/call.html -->
      <div class="list-item" id="callItem">
        <span class="list-label">来电铃声</span>
        <span class="list-arrow">›</span>
      </div>

      <!-- 美化 → my/beautify.html -->
      <div class="list-item" id="beautifyItem">
        <span class="list-label">美化</span>
        <span class="list-arrow">›</span>
      </div>

      <!-- 地址 → my/park.html -->
      <div class="list-item" id="parkItem">
        <span class="list-label">地址</span>
        <span class="list-arrow">›</span>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item" data-page="chat">
        <span>💬</span>
        聊天
      </button>
      <button class="nav-item" data-page="name">
        <span>👥</span>
        通讯录
      </button>
      <button class="nav-item" data-page="search">
        <span>🧭</span>
        发现
      </button>
      <button class="nav-item active" data-page="my">
        <span>👤</span>
        我
      </button>
    </div>
  </div>

  <script>
    (function() {
      function loadUserData() {
        try {
          const stored = localStorage.getItem('user_data');
          if (stored) {
            return JSON.parse(stored);
          }
        } catch (e) {}
        return {
          id: 'user_' + Date.now().toString(36),
          name: '用户',
          avatar: '',
          signature: '',
          gender: '',
          region: '',
          money: 0
        };
      }

      function saveUserData(data) {
        localStorage.setItem('user_data', JSON.stringify(data));
      }

      let userData = loadUserData();
      if (!userData.id) {
        userData.id = 'user_' + Date.now().toString(36);
        saveUserData(userData);
      }

      function renderAll() {
        document.getElementById('namecardName').textContent = userData.name || '未设置';
        document.getElementById('namecardId').textContent = 'ID: ' + (userData.id || '--------');
        document.getElementById('namecardSignature').textContent = userData.signature || 'nothing…';
        
        if (userData.avatar) {
          document.getElementById('namecardImg').src = userData.avatar;
          document.getElementById('namecardImg').style.display = 'block';
          document.getElementById('avatarPlaceholder').style.display = 'none';
        } else {
          document.getElementById('namecardImg').style.display = 'none';
          document.getElementById('avatarPlaceholder').style.display = 'flex';
        }
        
        document.getElementById('genderValue').textContent = userData.gender || '未设置';
        document.getElementById('regionValue').textContent = userData.region || '未设置';
      }

      renderAll();

      // 头像上传
      const avatarFileInput = document.getElementById('avatarFileInput');
      document.getElementById('namecardAvatar').addEventListener('click', () => {
        avatarFileInput.click();
      });

      avatarFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          userData.avatar = ev.target.result;
          saveUserData(userData);
          renderAll();
        };
        reader.readAsDataURL(file);
      });

      // ★ 设定 → user.html
      document.getElementById('settingsItem').addEventListener('click', () => {
        window.location.href = 'user.html';
      });

      // ★ 资金 → my/money.html
      document.getElementById('moneyItem').addEventListener('click', () => {
        window.location.href = 'my/money.html';
      });

      // ★ 收藏 → my/collect.html
      document.getElementById('collectItem').addEventListener('click', () => {
        window.location.href = 'my/collect.html';
      });

      // ★ 拍一拍 → my/tap.html
      document.getElementById('tapItem').addEventListener('click', () => {
        window.location.href = 'my/tap.html';
      });

      // ★ 来电铃声 → my/call.html
      document.getElementById('callItem').addEventListener('click', () => {
        window.location.href = 'my/call.html';
      });

      // ★ 美化 → my/beautify.html
      document.getElementById('beautifyItem').addEventListener('click', () => {
        window.location.href = 'my/beautify.html';
      });

      // ★ 地址 → my/park.html
      document.getElementById('parkItem').addEventListener('click', () => {
        window.location.href = 'my/park.html';
      });

      // 底栏
const pageRoutes = {
    'chat': '../chat/phone.html',
    'name': '../friends/friends.html',
    'search': '../search/search.html',
    'my': 'my.html'
};

      document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
        item.addEventListener('click', function() {
          const page = this.getAttribute('data-page');
          if (page === 'my') return;
          const targetUrl = pageRoutes[page];
          if (targetUrl) {
            window.location.href = targetUrl;
          }
        });
      });

      // 监听user.html保存后自动更新
      window.addEventListener('storage', (e) => {
        if (e.key === 'user_data') {
          userData = loadUserData();
          renderAll();
        }
      });
    })();
  </script>
</body>
</html>
